<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>チバトル ルール・用語管理台帳 閲覧版</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f1ea;
      --panel: #fffdf8;
      --ink: #24211c;
      --muted: #6c6256;
      --line: #d8d0c3;
      --accent: #256f73;
      --accent-soft: #d9ece8;
      --danger: #9d3b3b;
      --shadow: 0 16px 34px rgba(45, 35, 20, 0.12);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", YuGothic, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      padding: 22px 28px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.92);
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .readonly-badge {
      flex: 0 0 auto;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    main {
      height: calc(100vh - 86px);
      display: grid;
      grid-template-columns: minmax(300px, 38%) minmax(420px, 1fr);
      gap: 16px;
      padding: 16px;
    }
    .pane {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 150px 130px;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #fbf7ef;
    }
    .toolbar.rules { grid-template-columns: 1fr 170px; }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
      font-size: 14px;
    }
    .count {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .list {
      overflow: auto;
      padding: 8px;
      scrollbar-gutter: stable;
    }
    .row, .group {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      font: inherit;
    }
    .group {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 8px 10px;
      color: var(--muted);
      background: #fbf7ef;
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid #ece5da;
      cursor: pointer;
      color: var(--ink);
    }
    .row:hover, .row.active { background: var(--accent-soft); }
    .row-title { font-weight: 800; font-size: 14px; }
    .row-sub { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .meta { display: flex; gap: 5px; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      background: #eee7dc;
      color: #51483d;
      white-space: nowrap;
    }
    .student { background: #dfeaf8; color: #23415f; }
    .teacher { background: #f3dfdf; color: #763333; }
    .vampire { background: #ece2f5; color: #553370; }
    .item { background: #e2eddc; color: #385c32; }
    .environment { background: #f4ead0; color: #6b4a1b; }
    .detail {
      min-height: 0;
      overflow: auto;
      padding: 20px;
      scrollbar-gutter: stable;
    }
    .detail h2 { margin: 0 0 8px; font-size: 26px; letter-spacing: 0; }
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 8px;
      margin: 14px 0;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .value { font-weight: 800; font-size: 18px; }
    section + section { margin-top: 16px; }
    h3 { margin: 0 0 8px; font-size: 15px; color: var(--accent); }
    .text-block {
      white-space: pre-wrap;
      line-height: 1.7;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
    }
    .muted { color: var(--muted); }
    a { color: var(--accent); }
    @media (max-width: 860px) {
      header { display: block; padding: 18px 16px 12px; }
      .readonly-badge { display: inline-flex; margin-top: 10px; }
      main { height: auto; min-height: calc(100vh - 120px); grid-template-columns: 1fr; padding: 10px; }
      .pane { min-height: 360px; }
      .toolbar, .toolbar.rules { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>チバトル ルール・用語管理台帳</h1>
      <p class="subtitle">ルール、キーワード、用語を確認するための閲覧専用ページ</p>
    </div>
    <span class="readonly-badge">閲覧専用</span>
  </header>
  <main>
    <div class="pane">
      <div class="toolbar rules">
        <input id="searchInput" type="search" placeholder="ルール・用語を検索">
        <select id="categoryFilter" aria-label="カテゴリで絞り込み">
          <option value="">全カテゴリ</option>
          <option value="basic">基本ルール</option><option value="board">盤面</option><option value="turn">ターン進行</option><option value="combat">戦闘</option><option value="type">タイプ共通効果</option><option value="keyword">キーワード</option><option value="term">用語</option>
        </select>
      </div>
      <div class="count" id="countText"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="pane">
      <div class="detail" id="detail"></div>
    </div>
  </main>
  <script>
    const RULES = [{"id":"victory_conditions","title":"勝利・敗北条件","category":"basic","order":10,"summary":"気力0、デッキ切れ、ターン制限、カード固有の特殊勝利で勝敗を決める。","body":"相手の気力を0にすると勝利。\n自分のターン開始時にデッキからカードを引けない場合、そのプレイヤーは敗北。\n後攻20ターン目の終了時に決着していない場合、その時点で気力が多いプレイヤーが勝利。同値なら引き分け。\nカードに特殊な勝利条件が書かれている場合、その条件を満たしたプレイヤーはゲームに勝利する。カニカウントが0になった場合はカニ勝利となる。","related":"気力 / デッキ切れ / ターン制限 / 特殊勝利 / カニカウント","notes":"ターン制限の判定は後攻20ターン目の終了時に行う。"},{"id":"deck_building","title":"デッキ構築","category":"basic","order":20,"summary":"デッキは40～60枚。同名カードは原則3枚まで。","body":"デッキ枚数は最低40枚、最大60枚。\n同じ名前のカードは、原則として1つのデッキに最大3枚まで入れられる。\nカードに個別の投入上限が書かれている場合、その上限を優先する。\n「○○○ガニ」は最大2枚、「毛蟹」と「どこにも居場所がないカニ」はそれぞれ最大1枚まで入れられる。\n生成限定カード、変化でのみ出現するカード、トークンは、通常のデッキには直接入れない。","related":"投入上限 / 生成 / 変化 / トークン","notes":""},{"id":"starting_state","title":"ゲーム開始時","category":"basic","order":30,"summary":"気力20。カードじゃんけんの勝者が先攻・後攻を選ぶ。","body":"両プレイヤーの初期気力は20。\nカードじゃんけんを行い、勝者が先攻または後攻を選ぶ。\n各プレイヤーはデッキから5枚引き、マリガン後にゲームを開始する。","related":"先攻 / 後攻 / マリガン","notes":""},{"id":"mulligan","title":"マリガン","category":"basic","order":40,"summary":"初期手札から0～5枚を選び、1度だけ引き直す。","body":"初期手札5枚のうち、好きな枚数を選んで引き直せる。\n選択枚数は0枚でもよい。\nマリガンはゲーム開始前に1度だけ行う。","related":"初期手札","notes":""},{"id":"field_structure","title":"盤面構成","category":"board","order":100,"summary":"席18、教卓2、共有環境1の合計21マス。","body":"各プレイヤーは3×3の席マス9個と、教卓マス1個を持つ。\n中央には両プレイヤー共有の環境マスが1個ある。\n合計は席マス18、教卓マス2、環境マス1の21マス。相手側は自分側と鏡合わせに表示する。","related":"席マス / 教卓マス / 環境マス","notes":""},{"id":"seat_zone","title":"席マス","category":"board","order":110,"summary":"各プレイヤーが持つ3×3の配置場所。","body":"主に出席者を置く3×3のマス。\n行・列や隣接位置を参照するカード効果がある。\nカードごとの配置制限や、環境による出席不可を優先する。","related":"行 / 列 / 隣接 / 出席不可","notes":""},{"id":"teacher_zone","title":"教卓マス","category":"board","order":120,"summary":"各プレイヤーが1個ずつ持つ教卓のマス。","body":"学生、教師、ヴァンパイアを出席させられる。\n「教卓マスにいるかぎり」「教卓マスに出席したとき」と書かれた効果は、このマスにいる場合だけ発動する。","related":"教師 / 出席","notes":""},{"id":"environment_zone","title":"環境マス","category":"board","order":130,"summary":"両プレイヤーが共有する環境カード専用マス。","body":"環境カードだけを置ける共有マス。\n空いている場合は先に使用したプレイヤーが配置できる。\nすでに環境カードがある場合、異なる名前の環境カードで上書きできる。環境マスにあるカードと同名のカードは使用できない。\n上書きされたカードは校外エリアへ送る。\nカード本文に例外が書かれている場合、そのカードは同名カードを上書きできる。","related":"環境 / 上書き / 同名カード / 校外エリア","notes":"「座れる席と座れない席の存在」は、同名カードを上書きできる。"},{"id":"late_zone","title":"遅刻ゾーン","category":"board","order":140,"summary":"遅刻を持つカードが出席まで待機する場所。","body":"遅刻を持つカードは、手札から使用した直後に指定マスへ出席せず、遅刻ゾーンへ置く。\n残りターン数が0になると指定したマスへ出席する。\n指定マスが埋まっている場合は校外エリアへ送る。","related":"遅刻 / 出席 / 校外エリア","notes":""},{"id":"outside_zone","title":"校外エリア","category":"board","order":150,"summary":"破壊・使用・上書きされたカードが置かれる場所。","body":"体力が0になったカード、破壊されたカード、使用済みの持ち物、上書きされた環境などを送る場所。\n一般的なカードゲームのトラッシュ・墓地に相当する。","related":"破壊 / 持ち物 / 上書き","notes":""},{"id":"turn_count","title":"ターンの数え方","category":"turn","order":200,"summary":"先攻1ターン目、後攻1ターン目のように別々に数える。","body":"ターン表示は「先攻1ターン目」「後攻1ターン目」「先攻2ターン目」のように数える。\n先攻と後攻がそれぞれ行動した後、次の番号へ進む。","related":"先攻 / 後攻","notes":""},{"id":"turn_start","title":"ターン開始","category":"turn","order":210,"summary":"戦意を増加・全回復し、カードを1枚引く。","body":"自分のターン開始時、戦意の最大値を1増やし、現在の戦意を最大値まで回復する。\n戦意の最大値は10を上限とする。\nその後、デッキからカードを1枚引く。","related":"戦意 / ドロー / デッキ切れ","notes":""},{"id":"will","title":"戦意","category":"turn","order":220,"summary":"カードを使うためのコスト。最大10。","body":"カード左上の数値が必要戦意。\nカードを使うと、その数値だけ現在の戦意を消費する。\n毎ターン最大値が1増加し、ターン開始時に全回復する。最大値は10。","related":"必要戦意 / ターン開始","notes":""},{"id":"draw","title":"ドロー","category":"turn","order":230,"summary":"デッキの一番上からカードを手札へ加える。","body":"通常は自分のターン開始時に1枚ドローする。\nカード効果による追加ドローもある。\n自分のターン開始時に引けない場合はデッキ切れで敗北する。","related":"デッキ切れ / 手札","notes":""},{"id":"specific_draw","title":"特定カードを引く効果","category":"turn","order":235,"summary":"指定されたカードがデッキにない場合でも、効果は可能な範囲で処理する。","body":"デッキから特定のカードを引く効果は、指定カードがデッキに存在しなくても使用できる。\n複数種類のカードをそれぞれ引く効果では、一方だけがデッキに存在する場合、存在するカードだけを引く。\n「1枚まで」「2枚まで」と書かれている場合、引ける最大枚数だけを引く。","related":"ドロー / デッキ / 生成 / まで","notes":""},{"id":"turn_end","title":"ターン終了","category":"turn","order":240,"summary":"終了時効果を処理して相手へ手番を渡す。","body":"ターン終了ボタンを押すと、自分のターン終了時効果を処理する。\n破壊判定や勝敗判定を行った後、相手のターンを開始する。","related":"ターン終了時効果","notes":""},{"id":"attack_targets","title":"攻撃対象","category":"combat","order":300,"summary":"相手の出席者または相手本体を攻撃対象として指名できる。","body":"攻撃可能な出席者は、相手の出席者1人または相手プレイヤー本体を攻撃対象として指名できる。\n相手本体への攻撃では、攻撃力ぶん相手の気力を減らす。","related":"出席者 / 指名 / 気力","notes":""},{"id":"attack_limit","title":"攻撃回数","category":"combat","order":310,"summary":"各出席者は原則として1ターンに1回攻撃できる。","body":"攻撃を行った出席者は、そのターン中にもう一度攻撃できない。\n次の自分のターン開始時に攻撃済み状態を解除する。","related":"攻撃済み","notes":""},{"id":"summoning_sickness","title":"召喚酔い","category":"combat","order":320,"summary":"出席したターンは原則として攻撃できない。","body":"カードを場へ出席させたターンは攻撃できない。\n陽気を持つ出席者は、この制限を無視して出席したターンに相手の出席者を攻撃できる。ただし、そのターンは相手本体を攻撃できない。","related":"出席 / 陽気","notes":""},{"id":"first_turn_attack","title":"先攻1ターン目の攻撃制限","category":"combat","order":330,"summary":"先攻は最初のターンに攻撃できない。","body":"先攻プレイヤーの1ターン目は、出席者で攻撃できない。\n後攻プレイヤーは後攻1ターン目から、攻撃可能な出席者で攻撃できる。","related":"先攻 / 後攻 / 召喚酔い","notes":""},{"id":"counterattack","title":"反撃","category":"combat","order":340,"summary":"カードを攻撃すると、攻撃対象の攻撃力ぶん反撃を受ける。","body":"カード同士の戦闘では、攻撃側が対象へ攻撃力ぶんダメージを与える。\nその後、攻撃側は攻撃されたカードの攻撃力ぶん反撃ダメージを受ける。\nプレイヤー本体は反撃しない。","related":"攻撃力 / ダメージ","notes":""},{"id":"damage","title":"ダメージ","category":"combat","order":350,"summary":"カードの現在体力またはプレイヤーの気力を減らす。","body":"カードがダメージを受けると現在体力を減らす。\n現在体力が0以下になったカードは校外エリアへ送る。\nプレイヤー本体がダメージを受けると気力を減らし、0になると敗北する。","related":"体力 / 気力 / 破壊","notes":""},{"id":"healing","title":"回復","category":"combat","order":360,"summary":"失った体力や気力を上限まで戻す。","body":"カードの回復は最大体力を超えない。\nプレイヤー本体の回復は初期上限の気力20を超えない。\n回復量が残りの不足分より大きい場合、実際に回復するのは不足分まで。","related":"体力 / 気力 / 最大体力","notes":""},{"id":"type_student","title":"タイプ「学生」","category":"type","order":400,"summary":"主に席マスへ出席するタイプ。","body":"学生は席マスと教卓マスへ出席できる。\nカードに行・列などの配置制限がある場合は、その制限を優先する。","related":"席マス / 教卓マス","notes":""},{"id":"type_teacher","title":"タイプ「教師」","category":"type","order":410,"summary":"教卓マスで能力を発揮するタイプ。","body":"教師は席マスと教卓マスへ出席できる。\n教卓マスにいるときだけ、教卓マスを条件とする能力や陽気が有効になる。\n教卓マスにいるタイプ「教師」は講義を持つ。","related":"教卓マス / 陽気 / 学生 / 講義","notes":""},{"id":"type_vampire","title":"タイプ「ヴァンパイア」","category":"type","order":420,"summary":"攻撃時に吸血し、特定のカードから受けるダメージが増える。","body":"ヴァンパイアは席マスと教卓マスへ出席できる。\n\n【吸血】\nこのカードが攻撃したとき、相手に実際に与えたダメージと同じ量だけ、このカードの体力を回復する。最大体力を超えて回復しない。\n\n【弱点】\n相手のカード名に「デザイン」を含むタイプ「教師」と、「ダブルダイヤモンドクロス」から受けるダメージは2倍になる。ただし、「デザインデーモンスレイヤー」の講義による1ダメージは弱点を参照しない。\n\n【特殊破壊】\n相手の場に「デザインデーモンスレイヤー」がいる状態で「ダブルダイヤモンドクロス」のダメージを受けた場合、残り体力に関係なく破壊される。直接ダメージと隣接ダメージの両方に適用する。","related":"吸血 / デザイン / 教師 / ダブルダイヤモンドクロス / デザインデーモンスレイヤー","notes":"各ヴァンパイアカードの説明欄には、この共通効果を繰り返し記載しない。表記は「ヴァンパイア」に統一する。"},{"id":"type_item","title":"タイプ「持ち物」","category":"type","order":430,"summary":"手札から使用し、効果を処理するカード。","body":"持ち物は盤面のマスへ出席させず、手札から使用して効果を処理する。\n誤操作防止の確認後、必要戦意を消費する。\n原則として効果処理後に校外エリアへ送る。\n装備カードは対象の出席者に付ける。装備先の出席者が場を離れた場合、装備していた持ち物も校外エリアへ送る。","related":"必要戦意 / 校外エリア / 装備","notes":""},{"id":"type_environment","title":"タイプ「環境」","category":"type","order":440,"summary":"共有の環境マスに残り続けるカード。","body":"環境カードは共有の環境マスにだけ配置できる。\n異なる名前の環境カードで上書きされるか、効果で破壊されるまで場に残る。\n原則として、環境マスにあるカードと同名の環境カードは使用できない。\n環境カードを使う時は中央表示の後、環境マスへ配置する。","related":"環境マス / 上書き / 同名カード","notes":""},{"id":"attendance","title":"出席","category":"keyword","order":500,"summary":"カードを手札やカード効果によって場へ置くこと。","body":"カードを席マス、教卓マス、環境マスへ置くこと。\nカード効果によって別のカードを場へ置く場合も「出席させる」と表記する。\n「出席したとき」は、カードが場へ置かれた直後に発動する効果を示す。","related":"場 / 出席時効果","notes":"カードを場へ置く動作は「召喚する」ではなく「出席させる」に統一する。"},{"id":"late","title":"遅刻X","category":"keyword","order":510,"summary":"出席までXターン遅刻ゾーンで待機する。","body":"遅刻を持つカードは、使用後すぐに場へ出ず遅刻ゾーンへ置く。\nXは出席までの残りターン数を示す。\nカウントが0になると指定したマスへ出席する。\n陽気を持つかどうかは、各カードの本文を参照する。","related":"遅刻ゾーン / 出席 / 陽気","notes":""},{"id":"cheerful","title":"陽気","category":"keyword","order":520,"summary":"出席したターンから、相手の出席者を攻撃できる。","body":"陽気を持つ出席者は召喚酔いを無視し、場へ出席したターンから相手の出席者を攻撃できる。\n陽気によって出席したターンに攻撃する場合、相手本体は攻撃できない。\n先攻1ターン目の攻撃制限は無視できない。\n教師カードの陽気は、教卓マスにいることが条件となる場合がある。\n超陽気は、陽気よりも強い攻撃制限解除として扱う。","related":"召喚酔い / 超陽気 / 先攻1ターン目 / 教卓マス / 攻撃対象","notes":""},{"id":"super_cheerful","title":"超陽気","category":"keyword","order":521,"summary":"出席したターンから、相手の出席者にも相手本体にも攻撃できる。","body":"超陽気を持つ出席者は召喚酔いを無視し、場へ出席したターンから相手の出席者または相手本体を攻撃できる。\n先攻1ターン目の攻撃制限は無視できない。\n陽気として参照される効果では、超陽気も陽気を持つものとして扱う。","related":"陽気 / 召喚酔い / 攻撃対象","notes":"旧表記「ネアカ」は「超陽気」に統一する。"},{"id":"attention","title":"注目","category":"keyword","order":525,"summary":"相手の攻撃対象を、このキーワードを持つ出席者へ限定する。","body":"注目を持つ出席者が場にいるかぎり、相手の出席者は、注目を持たない出席者や相手本体を攻撃できない。\n注目を持つ出席者が複数いる場合、攻撃側はその中から1人を攻撃対象として指名する。","related":"攻撃対象 / 指名 / 出席者","notes":""},{"id":"drowsiness","title":"眠気","category":"keyword","order":527,"summary":"攻撃時、50%の確率で攻撃を外す。","body":"眠気を持つ出席者が攻撃するとき、攻撃宣言のたびに50%の確率で攻撃を外す。\n攻撃を外した場合も、そのターンの攻撃回数を消費する。ダメージと反撃は発生しない。","related":"攻撃 / 反撃 / 攻撃回数","notes":""},{"id":"composure","title":"余裕","category":"keyword","order":529,"summary":"自分のターン終了時、この出席者の体力を2回復する。","body":"余裕を持つ出席者は、自分のターン終了時、自身の体力を2回復する。\n回復後の体力は最大体力を超えない。","related":"ターン終了 / 回復 / 体力","notes":""},{"id":"fusion","title":"融合","category":"keyword","order":530,"summary":"複数のカードをまとめて新しいカードを生成する。","body":"指定された複数のカードを消費し、別のカードへ変える処理。\n例：手札の定規2枚を融合し、ダブルダイヤモンドクロスを生成する。","related":"定規 / ダブルダイヤモンドクロス / 生成","notes":""},{"id":"equipment","title":"装備","category":"keyword","order":535,"summary":"持ち物を出席者に付け、継続する効果を与える。","body":"装備カードは、カード本文で指定された自分の出席者に付ける。\n装備した持ち物は通常の使用済み持ち物と異なり、すぐには校外エリアへ送らない。\n装備先の出席者が場を離れた場合、装備していた持ち物も校外エリアへ送る。\n装備カードは1人につき1枚まで。すでに装備カードが付いている出席者には、新しい装備カードを付けられない。\n「U太」または「裏U太」に装備するカードは、カード本文で戦意なしとして扱う。","related":"持ち物 / 出席者 / 校外エリア / U太 / 裏U太","notes":""},{"id":"generation","title":"生成","category":"keyword","order":540,"summary":"通常のカードプール外からカードを作って加える。","body":"カード効果によって、生成限定カードを手札や場へ新しく作ること。\n生成限定カードは通常のデッキへ直接入れない。","related":"生成限定 / 手札 / 出席","notes":""},{"id":"evolution","title":"進化","category":"keyword","order":550,"summary":"進化元のカードへ上から重ねて出席させる。","body":"指定された進化元カードの上へ進化カードを重ねる。\n進化元を置いてから1ターン経過するまで進化できない。\n進化前に受けていたダメージは進化後も引き継ぐ。\n進化前の出席者がすでに攻撃していた場合、進化後もそのターンは攻撃できない。\n進化後は進化カードの攻撃力・体力・能力を使用する。","related":"進化元 / 出席","notes":""},{"id":"transformation","title":"変化","category":"keyword","order":560,"summary":"条件を満たしたカードが別のカードへ置き換わる。","body":"指定された条件を満たしたカードを、別のカードへ置き換える処理。\n変化前のカードは手札や場から消え、変化後のカードとして扱う。\n例：濡れた食券は手札にある状態で自分のターン開始を3回迎えると、乾いた食券へ変化する。\n環境「学友会」は、環境マスにある状態でターンが2回終了すると「裏学友会」へ変化する。","related":"濡れた食券 / 乾いた食券 / 学友会 / 裏学友会","notes":""},{"id":"copy","title":"コピー","category":"keyword","order":570,"summary":"元カードの情報を引き継いだ新しいカードを作る。","body":"指定されたカードを複製し、新しいカードとして場や手札へ加える処理。\n吸血鬼化で作るコピーは、元カードの能力、効果、現在の攻撃力・最大体力・現在体力を引き継ぐ。\n吸血鬼化で作るコピーはタイプ「ヴァンパイア」になる。\nコピーは新しく出席したカードとして扱い、召喚酔いが発生する。","related":"吸血鬼化 / 出席 / 召喚酔い","notes":""},{"id":"field_term","title":"場","category":"term","order":600,"summary":"カードが実際に出ている盤面上の場所。","body":"席マス、教卓マス、環境マスなど、カードが出ている場所全体を指す。\n手札、デッキ、遅刻ゾーン、校外エリアは場に含めない。","related":"席マス / 教卓マス / 環境マス","notes":""},{"id":"attendee","title":"出席者","category":"term","order":610,"summary":"席マスまたは教卓マスに出席しているカード。","body":"場の席マスまたは教卓マスに存在する、攻撃力と体力を持つカードを指す。\n環境カードは出席者として扱わない。","related":"出席 / 場","notes":""},{"id":"row_column","title":"行・列","category":"term","order":620,"summary":"3×3の席マスの位置を、行列と同じ順序で示す。","body":"座標は必ず「行→列」の順で表記する。\n行は上から下へ1行目、2行目、3行目と数え、列は左から右へ1列目、2列目、3列目と数える。\nたとえば「2行3列」は、上から2番目・左から3番目の席マスを示す。座標は各プレイヤーの盤面を基準に判定する。","related":"席マス","notes":"相手盤面は画面上で鏡合わせに表示されるが、ルール上の座標は行→列で扱う。"},{"id":"designation","title":"指名","category":"term","order":625,"summary":"条件を満たす人物を、効果や攻撃の対象として決めること。","body":"出席者、学生、教師などの人物を対象として決めることを「指名」と呼ぶ。\n人物の人数は「1人」「2人」のように数える。\n手札やデッキのカードは「1枚」「2枚」のように数える。\nランダム処理では対象が無作為に指名され、プレイヤー自身は対象を決めない。","related":"出席者 / 攻撃対象 / ランダム","notes":""},{"id":"adjacent","title":"隣接","category":"term","order":630,"summary":"対象と同じ行にある、すぐ左とすぐ右の席マス。","body":"隣接は、対象の席マスと同じ行にある左右1マスを指す。\n上下や斜めの席マスは隣接に含めない。盤面外の位置は含めない。","related":"席マス / 行 / 列","notes":""},{"id":"surrounding_one","title":"周囲1マス","category":"term","order":635,"summary":"対象の左右・上下・斜めにある、1マス以内の席マス。","body":"周囲1マスは、対象の席マスから左右、上下、斜め4方向にある1マスを指す。\n中央の席マスを基準にした場合、周囲の最大8マスが対象となる。盤面外の位置は含めない。","related":"席マス / 隣接 / 行 / 列","notes":""},{"id":"destroy","title":"破壊","category":"term","order":640,"summary":"カードを場から校外エリアへ送る。","body":"カード効果によって破壊されたとき、または現在体力が0以下になったとき、そのカードを場から校外エリアへ送る。","related":"校外エリア / 体力","notes":""},{"id":"private_counter","title":"カニカウント","category":"term","order":645,"summary":"カニ勝利に必要なカードがそろうと始まる公開カウント。","body":"手札に「○○○ガニ」が2枚以上、「毛蟹」と「どこにも居場所がないカニ」が1枚以上ずつある状態で自分のターンを終了すると、カニカウントが4で開始する。\n以後、自分のターン終了時にカウントを1ずつ減らす。0になるとカニ勝利する。\nカニカウントは「🦀4」のように表示し、お互いのプレイヤーが確認できる。\n一度開始したカニカウントは、必要カードが手札からなくなってもリセットしない。","related":"特殊勝利 / ○○○ガニ / 毛蟹 / どこにも居場所がないカニ","notes":"カニ勝利時の表示は「かーちー🦀」。"},{"id":"library_out","title":"デッキ切れ（LO）","category":"term","order":650,"summary":"ターン開始時にカードを引けず敗北すること。","body":"自分のターン開始時、デッキが空で通常ドローを行えない場合、その場で敗北する。\nLOはLibrary Outの略。","related":"ドロー / 敗北","notes":""},{"id":"lecture","name":"lecture","type":"item","cost":null,"attack":null,"hp":null,"availability":"deck","placement":"","effect":"","combo":"","notes":"旧表記の『教卓マスにいる教師が相手の学生すべてに1ダメージを与える効果』を、講義と呼ぶ。","title":"講義","category":"keyword","order":528,"summary":"教卓マスにいる教師が持つ共通効果。","body":"タイプ「教師」が教卓マスにいるなら、自分のターン終了時、相手の場のタイプ「学生」すべてに1ダメージを与える。\nカード本文で講義の対象が変更されている場合、そのカード本文を優先する。\n「デザインデーモンスレイヤー」の講義は対象が相手のヴァンパイアになるが、弱点を参照せず、常に1ダメージとして処理する。","related":"教師 / 教卓マス / ターン終了 / 学生"}];
    const CATEGORY_LABELS = {"basic":"基本ルール","board":"盤面","turn":"ターン進行","combat":"戦闘","type":"タイプ共通効果","keyword":"キーワード","term":"用語"};
    let selectedId = RULES[0]?.id || null;
    const elements = {
      search: document.getElementById('searchInput'),
      category: document.getElementById('categoryFilter'),
      count: document.getElementById('countText'),
      list: document.getElementById('list'),
      detail: document.getElementById('detail')
    };
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }
    function matches(rule) {
      const query = elements.search.value.trim().toLowerCase();
      const haystack = [rule.title, rule.id, rule.summary, rule.body, rule.related, rule.notes].join(' ').toLowerCase();
      return (!query || haystack.includes(query)) && (!elements.category.value || rule.category === elements.category.value);
    }
    function filteredRules() {
      return RULES.filter(matches).sort((a, b) => (a.order ?? 9999) - (b.order ?? 9999) || a.title.localeCompare(b.title, 'ja'));
    }
    function renderList() {
      const rules = filteredRules();
      elements.count.textContent = '表示 ' + rules.length + '項目 / 全' + RULES.length + '項目';
      if (!rules.some((rule) => rule.id === selectedId)) selectedId = rules[0]?.id || null;
      let lastCategory = '';
      elements.list.innerHTML = rules.map((rule) => {
        const group = rule.category !== lastCategory ? '<div class="group">' + escapeHtml(CATEGORY_LABELS[rule.category] || rule.category) + '</div>' : '';
        lastCategory = rule.category;
        const active = rule.id === selectedId ? ' active' : '';
        return group + '<button class="row' + active + '" type="button" data-id="' + escapeHtml(rule.id) + '">'
          + '<span><span class="row-title">' + escapeHtml(rule.title) + '</span>'
          + '<span class="row-sub">' + escapeHtml(rule.summary || '') + '</span></span>'
          + '<span class="meta"><span class="badge">' + escapeHtml(CATEGORY_LABELS[rule.category] || rule.category) + '</span></span>'
          + '</button>';
      }).join('') || '<p class="muted">該当するルール・用語がありません。</p>';
      renderDetail();
    }
    function renderDetail() {
      const rule = RULES.find((entry) => entry.id === selectedId);
      if (!rule) {
        elements.detail.innerHTML = '<p class="muted">左の一覧から項目を選んでください。</p>';
        return;
      }
      elements.detail.innerHTML = '<h2>' + escapeHtml(rule.title) + '</h2>'
        + '<div class="detail-meta"><span class="badge">' + escapeHtml(CATEGORY_LABELS[rule.category] || rule.category) + '</span>'
        + '<span class="badge">ID: ' + escapeHtml(rule.id) + '</span></div>'
        + '<section><h3>概要</h3><div class="text-block">' + escapeHtml(rule.summary || '-') + '</div></section>'
        + '<section><h3>説明</h3><div class="text-block">' + escapeHtml(rule.body || '-') + '</div></section>'
        + (rule.related ? '<section><h3>関連</h3><div class="text-block">' + escapeHtml(rule.related) + '</div></section>' : '')
        + (rule.notes ? '<section><h3>備考</h3><div class="text-block">' + escapeHtml(rule.notes) + '</div></section>' : '');
    }
    elements.list.addEventListener('click', (event) => {
      const row = event.target.closest('[data-id]');
      if (!row) return;
      selectedId = row.dataset.id;
      renderList();
    });
    [elements.search, elements.category].forEach((element) => element.addEventListener('input', renderList));
    renderList();
  </script>
