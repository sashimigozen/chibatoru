<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>チバトル ルールブック・用語集 閲覧版</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --ink: #122033;
      --muted: #536276;
      --line: #b8c3d3;
      --accent: #2457d6;
      --accent-soft: #dbeafe;
      --danger: #b91c1c;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
      --surface: #edf3f8;
      --panel-soft: #f8fbff;
      --teal: #0f766e;
      --amber: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", YuGothic, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--surface) 58%, #e9eff6 100%);
      color: var(--ink);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      padding: 22px 28px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .readonly-badge {
      flex: 0 0 auto;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    main {
      height: calc(100vh - 86px);
      display: grid;
      grid-template-columns: minmax(300px, 38%) minmax(420px, 1fr);
      gap: 16px;
      padding: 16px;
    }
    .pane {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 150px 130px;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .toolbar.rules { grid-template-columns: 1fr 170px; }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
      font-size: 14px;
    }
    .count {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .list {
      overflow: auto;
      padding: 8px;
      scrollbar-gutter: stable;
    }
    .row, .group {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      font: inherit;
    }
    .group {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 8px 10px;
      color: var(--muted);
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid #e1e8f0;
      cursor: pointer;
      color: var(--ink);
    }
    .row:hover, .row.active { background: var(--accent-soft); }
    .row.active { box-shadow: inset 4px 0 0 var(--accent); }
    .row-title { font-weight: 800; font-size: 14px; }
    .row-sub { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .meta { display: flex; gap: 5px; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      background: #eef2f7;
      color: #24364d;
      white-space: nowrap;
    }
    .student { background: #dff3ff; color: #164e63; }
    .teacher { background: #efe9ff; color: #553c9a; }
    .vampire { background: #ffe3e3; color: #991b1b; }
    .item { background: #fff2bf; color: #92400e; }
    .environment { background: #ddf8e8; color: #166534; }
    .detail {
      min-height: 0;
      overflow: auto;
      padding: 20px;
      scrollbar-gutter: stable;
    }
    .detail h2 { margin: 0 0 8px; font-size: 26px; letter-spacing: 0; }
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 8px;
      margin: 14px 0;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .value { font-weight: 800; font-size: 18px; }
    section + section { margin-top: 16px; }
    h3 { margin: 0 0 8px; font-size: 15px; color: var(--accent); }
    .guide-note {
      border: 1px solid #9ec5fe;
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      background: #eef6ff;
      color: #14356f;
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .text-block {
      white-space: pre-wrap;
      line-height: 1.7;
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
    }
    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .link-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 6px 11px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
      cursor: pointer;
    }
    .link-chip:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .link-chip.is-missing {
      border-color: var(--line);
      background: #f8fafc;
      color: var(--muted);
      cursor: default;
    }
    .muted { color: var(--muted); }
    a { color: var(--accent); }
    @media (max-width: 860px) {
      header { display: block; padding: 18px 16px 12px; }
      .readonly-badge { display: inline-flex; margin-top: 10px; }
      main { height: auto; min-height: calc(100vh - 120px); grid-template-columns: 1fr; padding: 10px; }
      .pane { min-height: 360px; }
      .toolbar, .toolbar.rules { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>チバトル ルールブック・用語集</h1>
      <p class="subtitle">初めて遊ぶ人が基本ルール、キーワード、用語を確認するための閲覧専用ページ</p>
    </div>
    <span class="readonly-badge">閲覧専用</span>
  </header>
  <main>
    <div class="pane">
      <div class="toolbar rules">
        <input id="searchInput" type="search" placeholder="ルール・用語を検索">
        <select id="categoryFilter" aria-label="カテゴリで絞り込み">
          <option value="">全カテゴリ</option>
          <option value="basic">基本ルール</option><option value="board">盤面</option><option value="turn">ターン進行</option><option value="combat">戦闘</option><option value="type">タイプ共通効果</option><option value="keyword">キーワード</option><option value="term">用語</option>
        </select>
      </div>
      <div class="count" id="countText"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="pane">
      <div class="detail" id="detail"></div>
    </div>
  </main>
  <script>
    const RULES = [{"id":"first_read","title":"はじめに読むところ","category":"basic","order":1,"summary":"チバトルで最初に覚えることをまとめた入口。","body":"チバトルは、手札のカードを使って出席者を場に出し、相手の気力を0にするカードゲーム。\n\nまず覚えることは4つ。\n1. 自分の気力は20から始まる。相手の気力を0にすると勝利。\n2. カードを使うには戦意を支払う。戦意は毎ターン増えて、最大10まで増える。\n3. 学生・教師・ヴァンパイアは席マスや教卓マスに出席し、攻撃できる。持ち物は使い切り、環境は環境マスに残る。\n4. カードに書かれている効果は、基本ルールより優先する。","related":"気力 / 戦意 / 出席 / タイプ","notes":"迷ったら、カード本文を優先して読む。"},{"id":"how_to_play_first_game","title":"最初の1ゲームの流れ","category":"basic","order":5,"summary":"対戦開始から最初のターンまでの流れ。","body":"1. デッキを選ぶ。\n2. カードじゃんけんを行い、勝ったプレイヤーが先攻・後攻を選ぶ。\n3. お互いに初期手札を5枚引く。\n4. マリガンで、引き直したいカードを0～5枚選ぶ。\n5. バトル開始。自分のターン開始時に戦意が増え、カードを1枚引く。\n6. 手札からカードを使い、出席者で攻撃し、終わったらターン終了を押す。","related":"デッキ / カードじゃんけん / マリガン / ターン開始 / ターン終了","notes":""},{"id":"victory_conditions","title":"勝利・敗北条件","category":"basic","order":10,"summary":"気力0、デッキ切れ、カード固有の特殊勝利で勝敗を決める。","body":"相手の気力を0にすると勝利。\n自分のターン開始時にデッキからカードを引けない場合、そのプレイヤーは敗北。\nカードに特殊な勝利条件が書かれている場合、その条件を満たしたプレイヤーはゲームに勝利する。カニカウントが0になった場合はカニ勝利となる。","related":"気力 / デッキ切れ / 特殊勝利 / カニカウント","notes":"カード効果でデッキが空になっても、すぐには敗北しない。自分のターン開始時の通常ドローで引けない場合に敗北する。"},{"id":"deck_building","title":"デッキ構築","category":"basic","order":20,"summary":"デッキは40～60枚。同名カードは原則3枚まで。","body":"デッキ枚数は最低40枚、最大60枚。\n同じ名前のカードは、原則として1つのデッキに最大3枚まで入れられる。\nカードに個別の投入上限が書かれている場合、その上限を優先する。\n「○○○ガニ」は最大2枚、「毛蟹」と「どこにも居場所がないカニ」はそれぞれ最大1枚まで入れられる。\n生成限定カード、変化でのみ出現するカード、トークンは、通常のデッキには直接入れない。\nカード一覧では「デッキ投入」と表示されたカードだけを通常デッキに入れられる。","related":"投入上限 / 生成 / 変化 / トークン / カード一覧","notes":""},{"id":"card_layout","title":"カードの見方","category":"basic","order":25,"summary":"カードに表示される戦意・攻撃力・体力の位置。","body":"カード左上の数字は、使うために必要な戦意。\nカード左下の数字は攻撃力。攻撃したときに与える基本ダメージ。\nカード右下の数字は体力。0以下になると校外エリアへ送られる。\n\n場に出ている出席者は、現在の攻撃力と現在の体力が表示される。効果で増減した場合、カード本来の数値ではなく現在の数値を見る。","related":"戦意 / 攻撃力 / 体力 / 出席者","notes":"持ち物と環境は攻撃力・体力を持たない。"},{"id":"starting_state","title":"ゲーム開始時","category":"basic","order":30,"summary":"気力20。カードじゃんけんの勝者が先攻・後攻を選ぶ。","body":"両プレイヤーの初期気力は20。\nカードじゃんけんを行い、勝者が先攻または後攻を選ぶ。\n各プレイヤーはデッキから5枚引き、マリガン後にゲームを開始する。","related":"先攻 / 後攻 / マリガン","notes":""},{"id":"card_janken","title":"カードじゃんけん","category":"basic","order":32,"summary":"ゲーム開始時に先攻・後攻を決める演出。","body":"バトル開始前にカードじゃんけんを行う。\nじゃんけんに勝ったプレイヤーが、先攻か後攻を選ぶ。\nその後、初期手札を引き、マリガンへ進む。","related":"先攻 / 後攻 / 初期手札 / マリガン","notes":""},{"id":"initial_hand","title":"初期手札","category":"basic","order":38,"summary":"ゲーム開始時にデッキから引く最初の5枚。","body":"ゲーム開始時、各プレイヤーは自分のデッキから5枚引く。\nこの5枚を見てから、マリガンで0～5枚を選んで引き直せる。","related":"デッキ / 手札 / マリガン / シャッフル","notes":""},{"id":"mulligan","title":"マリガン","category":"basic","order":40,"summary":"初期手札から0～5枚を選び、1度だけ引き直す。","body":"初期手札5枚のうち、好きな枚数を選んで引き直せる。\n選択枚数は0枚でもよい。\n選んだカードをデッキへ戻してシャッフルし、同じ枚数を引く。\nマリガンはゲーム開始前に1度だけ行う。\nオンライン対戦でも、自分が確定するまでは選んだカードが選択状態として表示される。","related":"初期手札 / シャッフル / オンライン対戦","notes":""},{"id":"online_battle","title":"オンライン対戦","category":"basic","order":55,"summary":"2人で同じ部屋に入り、同じ状態を同期して遊ぶ。","body":"オンライン対戦では、ホストとゲストが同じ部屋コードで対戦する。\nホスト側のゲーム状態を正として、ゲスト側の画面へ同期する。\nゲスト側もマリガンの選択、カード使用、攻撃、ターン終了を通常どおり操作できる。\n手札の選択、出席先の選択、ログの詳細確認など、自分だけが見て操作する画面は相手には表示されない。\n観戦者として入った場合は、対戦操作はできず、盤面と手札を確認するだけになる。","related":"ホスト / ゲスト / 観戦者 / マリガン","notes":"バージョン違いを避けるため、オンライン対戦では同じGitHub PagesのURLを開く。"},{"id":"private_operation","title":"非公開操作","category":"basic","order":56,"summary":"自分だけが見て選ぶ操作。オンライン対戦では相手に表示しない。","body":"出席先を選ぶ画面、手札からカードを選ぶ画面、ログの詳細確認画面などは、その操作をしているプレイヤーだけに表示する。\n相手には、確定した結果だけが盤面・ログとして共有される。\n「細い」のように対象になったプレイヤーが手札を選ぶ効果では、選択画面は対象になった本人だけに表示する。\nこれにより、相手の手札や選択中の内容を見てしまう事故を防ぐ。","related":"オンライン対戦 / 手札 / ログ / 出席","notes":"観戦者は観戦用の表示に従う。"},{"id":"card_list_reference","title":"カード一覧","category":"basic","order":58,"summary":"現在のカードプールを確認するための閲覧ページ。","body":"カード一覧では、現在ゲームに入っているカードのタイプ、戦意、攻撃力、体力、効果、配置・使用条件を確認できる。\nデッキに直接入れられるカードは「デッキ投入」と表示される。生成カードやトークンは、カード効果でのみ使う。","related":"デッキ構築 / 生成 / トークン / タイプ","notes":"READMEの「カード一覧」リンクから開ける。"},{"id":"field_structure","title":"盤面構成","category":"board","order":100,"summary":"席18、教卓2、共有環境1の合計21マス。","body":"各プレイヤーは3×3の席マス9個と、教卓マス1個を持つ。\n中央には両プレイヤー共有の環境マスが1個ある。\n合計は席マス18、教卓マス2、環境マス1の21マス。相手側は自分側と鏡合わせに表示する。","related":"席マス / 教卓マス / 環境マス","notes":""},{"id":"seat_zone","title":"席マス","category":"board","order":110,"summary":"各プレイヤーが持つ3×3の配置場所。","body":"主に出席者を置く3×3のマス。\n行・列や隣接位置を参照するカード効果がある。\nカードごとの配置制限や、環境による出席不可を優先する。","related":"行 / 列 / 隣接 / 出席不可","notes":""},{"id":"teacher_zone","title":"教卓マス","category":"board","order":120,"summary":"各プレイヤーが1個ずつ持つ教卓のマス。","body":"学生、教師、ヴァンパイアを出席させられる。\n「教卓マスにいるかぎり」「教卓マスに出席したとき」と書かれた効果は、このマスにいる場合だけ発動する。","related":"教師 / 出席","notes":""},{"id":"environment_zone","title":"環境マス","category":"board","order":130,"summary":"両プレイヤーが共有する環境カード専用マス。","body":"環境カードだけを置ける共有マス。\n空いている場合は先に使用したプレイヤーが配置できる。\nすでに環境カードがある場合、異なる名前の環境カードで上書きできる。環境マスにあるカードと同名のカードは使用できない。\n上書きされたカードは校外エリアへ送る。\nカード本文に例外が書かれている場合、そのカードは同名カードを上書きできる。","related":"環境 / 上書き / 同名カード / 校外エリア","notes":"「座れる席と座れない席の存在」は、同名カードを上書きできる。"},{"id":"late_zone","title":"遅刻ゾーン","category":"board","order":140,"summary":"遅刻を持つカードが出席まで待機する場所。","body":"遅刻を持つカードは、手札から使用した直後に指定マスへ出席せず、遅刻ゾーンへ置く。\n残りターン数が0になると指定したマスへ出席する。\n指定マスが埋まっている場合は校外エリアへ送る。","related":"遅刻 / 出席 / 校外エリア","notes":""},{"id":"outside_zone","title":"校外エリア","category":"board","order":150,"summary":"破壊・使用・上書きされたカードが置かれる場所。","body":"体力が0になったカード、破壊されたカード、使用済みの持ち物、上書きされた環境などを送る場所。\n手札やデッキから効果で送られたカードも校外エリアへ置く。\n一般的なカードゲームのトラッシュ・墓地に相当する。\nゲーム画面では、校外エリアに何が何枚あるかを確認できる。カードが校外へ送られたときは、どのカードが送られたか見えるように表示される。","related":"破壊 / 持ち物 / 上書き / デッキから校外へ送る","notes":""},{"id":"first_second","title":"先攻・後攻","category":"turn","order":198,"summary":"先に行動するプレイヤーと、後から行動するプレイヤー。","body":"先攻は先に1ターン目を行うプレイヤー。\n後攻はその後に1ターン目を行うプレイヤー。\n先攻1ターン目は攻撃できない。後攻1ターン目は、攻撃可能な出席者がいれば攻撃できる。","related":"カードじゃんけん / ターンの数え方 / 先攻1ターン目","notes":""},{"id":"turn_count","title":"ターンの数え方","category":"turn","order":200,"summary":"先攻1ターン目、後攻1ターン目のように別々に数える。","body":"ターン表示は「先攻1ターン目」「後攻1ターン目」「先攻2ターン目」のように数える。\n先攻と後攻がそれぞれ行動した後、次の番号へ進む。","related":"先攻 / 後攻","notes":""},{"id":"turn_sequence","title":"1ターンの流れ","category":"turn","order":205,"summary":"ターン開始からターン終了までの基本手順。","body":"自分のターンは、次の順で進む。\n1. 戦意の最大値が1増え、現在戦意が最大まで回復する。最大値は10まで。\n2. ターン開始時効果を処理する。\n3. デッキからカードを1枚引く。\n4. 手札のカードを使ったり、出席者で攻撃したりする。\n5. ターン終了を押す。\n6. ターン終了時効果を処理し、相手のターンへ移る。","related":"ターン開始 / 戦意 / ドロー / 攻撃 / ターン終了","notes":"効果の処理順は、基本的にゲーム画面のログと表示に従う。"},{"id":"turn_start","title":"ターン開始","category":"turn","order":210,"summary":"戦意を増加・全回復し、カードを1枚引く。","body":"自分のターン開始時、戦意の最大値を1増やし、現在の戦意を最大値まで回復する。\n戦意の最大値は10を上限とする。\nその後、デッキからカードを1枚引く。","related":"戦意 / ドロー / デッキ切れ","notes":""},{"id":"turn_start_effect","title":"ターン開始時効果","category":"turn","order":212,"summary":"ターン開始時に自動で処理される効果。","body":"「自分のターン開始時」「相手のターン開始時」と書かれた効果は、該当するターンが始まったときに処理する。\n通常のターン開始処理では、戦意の回復、ターン開始時効果、通常ドローなどを順に行う。","related":"ターン開始 / 戦意 / ドロー","notes":"処理順はゲーム画面のログと表示に従う。"},{"id":"will","title":"戦意","category":"turn","order":220,"summary":"カードを使うためのコスト。最大10。","body":"カード左上の数値が必要戦意。\nカードを使うと、その数値だけ現在の戦意を消費する。\n毎ターン最大値が1増加し、ターン開始時に全回復する。最大値は10。","related":"必要戦意 / ターン開始","notes":""},{"id":"necessary_will","title":"必要戦意","category":"turn","order":221,"summary":"カードを使うために支払う戦意の数。","body":"カード左上に表示される数値。\nカードを使うと、その数値ぶん現在戦意を消費する。\n戦意が足りないカードは、原則として使えない。","related":"戦意 / カードの見方","notes":"進化カードなど、戦意を持たないカードもある。"},{"id":"draw","title":"ドロー","category":"turn","order":230,"summary":"デッキの一番上からカードを手札へ加える。","body":"通常は自分のターン開始時に1枚ドローする。\nカード効果による追加ドローもある。\nカード効果で複数枚引く場合、デッキ枚数が足りなければ引ける枚数だけ引く。\n自分のターン開始時の通常ドローで引けない場合はデッキ切れで敗北する。","related":"デッキ切れ / 手札 / デッキから校外へ送る","notes":""},{"id":"specific_draw","title":"特定カードを引く効果","category":"turn","order":235,"summary":"指定されたカードがデッキにない場合でも、効果は可能な範囲で処理する。","body":"デッキから特定のカードを引く効果は、指定カードがデッキに存在しなくても使用できる。\n複数種類のカードをそれぞれ引く効果では、一方だけがデッキに存在する場合、存在するカードだけを引く。\n「1枚まで」「2枚まで」と書かれている場合、引ける最大枚数だけを引く。","related":"ドロー / デッキ / 生成 / まで","notes":""},{"id":"turn_end","title":"ターン終了","category":"turn","order":240,"summary":"終了時効果を処理して相手へ手番を渡す。","body":"ターン終了ボタンを押すと、自分のターン終了時効果を処理する。\n破壊判定や勝敗判定を行った後、相手のターンを開始する。","related":"ターン終了時効果","notes":""},{"id":"turn_end_effect","title":"ターン終了時効果","category":"turn","order":242,"summary":"ターン終了ボタンを押した後、決まった順番で処理される効果。","body":"「自分のターン終了時」「相手のターン終了時」と書かれた効果は、該当するターンが終わるときに処理する。\n\n終了時効果は、原則として次の順で処理する。\n1. 持ち物の効果\n2. 講義\n3. 教師の効果\n4. 学生の効果\n5. 環境の効果\n\n各段階のあと、体力が0以下の出席者を校外エリアへ送り、継続効果を再計算する。","related":"ターン終了 / 持ち物 / 講義 / 教師 / 学生 / 環境","notes":""},{"id":"attack_targets","title":"攻撃対象","category":"combat","order":300,"summary":"相手の出席者または相手本体を攻撃対象として指名できる。","body":"攻撃可能な出席者は、相手の出席者1人または相手プレイヤー本体を攻撃対象として指名できる。\n相手本体への攻撃では、攻撃力ぶん相手の気力を減らす。","related":"出席者 / 指名 / 気力","notes":""},{"id":"attack_resolution_order","title":"攻撃処理の順番","category":"combat","order":305,"summary":"攻撃対象を指名してから、効果・ダメージ・反撃を順番に処理する。","body":"攻撃は次の順で処理する。\n1. 攻撃側が攻撃対象を指名する。\n2. 攻撃側の攻撃時効果や、攻撃側に適用されている効果を処理する。\n3. 攻撃対象の効果や、攻撃対象に適用されている効果を処理する。\n4. 攻撃対象が攻撃側の攻撃力ぶんダメージを受ける。\n5. 攻撃対象が出席者の場合、攻撃側はその出席者の攻撃力ぶん反撃ダメージを受ける。\n\n相手本体を攻撃した場合、反撃は発生しない。","related":"攻撃対象 / 反撃 / ダメージ / 攻撃時効果","notes":"カード本文に特別な処理順が書かれている場合は、カード本文を優先する。"},{"id":"attack_limit","title":"攻撃回数","category":"combat","order":310,"summary":"各出席者は原則として1ターンに1回攻撃できる。","body":"攻撃を行った出席者は、そのターン中にもう一度攻撃できない。\n次の自分のターン開始時に攻撃済み状態を解除する。","related":"攻撃済み","notes":""},{"id":"summoning_sickness","title":"召喚酔い","category":"combat","order":320,"summary":"出席したターンは原則として攻撃できない。","body":"カードを場へ出席させたターンは攻撃できない。\n陽気を持つ出席者は、この制限を無視して出席したターンに相手の出席者を攻撃できる。ただし、そのターンは相手本体を攻撃できない。\n進化した場合、進化元の出席者が召喚酔いしておらず、まだ攻撃していなければ、進化後の出席者もそのターンに攻撃できる。進化元が攻撃済みの場合、進化後も攻撃済みとして扱う。","related":"出席 / 陽気 / 進化 / 攻撃済み","notes":""},{"id":"first_turn_attack","title":"先攻1ターン目の攻撃制限","category":"combat","order":330,"summary":"先攻は最初のターンに攻撃できない。","body":"先攻プレイヤーの1ターン目は、出席者で攻撃できない。\n後攻プレイヤーは後攻1ターン目から、攻撃可能な出席者で攻撃できる。","related":"先攻 / 後攻 / 召喚酔い","notes":""},{"id":"counterattack","title":"反撃","category":"combat","order":340,"summary":"カードを攻撃すると、攻撃対象の攻撃力ぶん反撃を受ける。","body":"カード同士の戦闘では、攻撃側が対象へ攻撃力ぶんダメージを与える。\nその後、攻撃側は攻撃されたカードの攻撃力ぶん反撃ダメージを受ける。\nプレイヤー本体は反撃しない。","related":"攻撃力 / ダメージ","notes":""},{"id":"damage","title":"ダメージ","category":"combat","order":350,"summary":"カードの現在体力またはプレイヤーの気力を減らす。","body":"カードがダメージを受けると現在体力を減らす。\n現在体力が0以下になったカードは校外エリアへ送る。\nプレイヤー本体がダメージを受けると気力を減らし、0になると敗北する。\n一時的な効果で最大体力が増減しても、そのカードが受けているダメージ量は維持する。最大体力上昇効果が終了した場合、受けていたダメージはそのまま残る。\nゲーム画面では、ダメージや回復が発生した対象の近くに数値が表示される。","related":"体力 / 気力 / 破壊 / 回復","notes":""},{"id":"healing","title":"回復","category":"combat","order":360,"summary":"失った体力や気力を上限まで戻す。","body":"カードの回復は最大体力を超えない。\nプレイヤー本体の回復は初期上限の気力20を超えない。\n回復量が残りの不足分より大きい場合、実際に回復するのは不足分まで。","related":"体力 / 気力 / 最大体力","notes":""},{"id":"type_student","title":"タイプ「学生」","category":"type","order":400,"summary":"主に席マスへ出席するタイプ。","body":"学生は席マスと教卓マスへ出席できる。\nカードに行・列などの配置制限がある場合は、その制限を優先する。","related":"席マス / 教卓マス","notes":""},{"id":"type_teacher","title":"タイプ「教師」","category":"type","order":410,"summary":"教卓マスで能力を発揮するタイプ。","body":"教師は席マスと教卓マスへ出席できる。\n教卓マスにいるときだけ、教卓マスを条件とする能力や陽気が有効になる。\n教卓マスにいるタイプ「教師」は講義を持つ。","related":"教卓マス / 陽気 / 学生 / 講義","notes":""},{"id":"type_vampire","title":"タイプ「ヴァンパイア」","category":"type","order":420,"summary":"攻撃時に吸血し、特定のカードから受けるダメージが増える。","body":"ヴァンパイアは席マスと教卓マスへ出席できる。\n\n【吸血】\nこのカードが攻撃したとき、相手に実際に与えたダメージと同じ量だけ、このカードの体力を回復する。最大体力を超えて回復しない。\n\n【弱点】\n相手のカード名に「デザイン」を含むタイプ「教師」と、「ダブルダイヤモンドクロス」から受けるダメージは2倍になる。ただし、「デザインデーモンスレイヤー」の講義による1ダメージは弱点を参照しない。\n\n【特殊破壊】\n相手の場に「デザインデーモンスレイヤー」がいる状態で「ダブルダイヤモンドクロス」のダメージを受けた場合、残り体力に関係なく破壊される。直接ダメージと隣接ダメージの両方に適用する。","related":"吸血 / デザイン / 教師 / ダブルダイヤモンドクロス / デザインデーモンスレイヤー","notes":"各ヴァンパイアカードの説明欄には、この共通効果を繰り返し記載しない。表記は「ヴァンパイア」に統一する。"},{"id":"type_item","title":"タイプ「持ち物」","category":"type","order":430,"summary":"手札から使用し、効果を処理するカード。","body":"持ち物は盤面のマスへ出席させず、手札から使用して効果を処理する。\n誤操作防止の確認後、必要戦意を消費する。\n原則として効果処理後に校外エリアへ送る。\n装備カードは対象の出席者に付ける。装備先の出席者が場を離れた場合、装備していた持ち物も校外エリアへ送る。\n「デッキの上から校外へ送る」「手札をデッキへ戻す」など、盤面以外に影響する持ち物もある。","related":"必要戦意 / 校外エリア / 装備 / デッキから校外へ送る","notes":""},{"id":"type_environment","title":"タイプ「環境」","category":"type","order":440,"summary":"共有の環境マスに残り続けるカード。","body":"環境カードは共有の環境マスにだけ配置できる。\n異なる名前の環境カードで上書きされるか、効果で破壊されるまで場に残る。\n原則として、環境マスにあるカードと同名の環境カードは使用できない。\n環境カードを使う時は中央表示の後、環境マスへ配置する。","related":"環境マス / 上書き / 同名カード","notes":""},{"id":"attendance","title":"出席","category":"keyword","order":500,"summary":"カードを手札やカード効果によって場へ置くこと。","body":"カードを席マス、教卓マス、環境マスへ置くこと。\nカード効果によって別のカードを場へ置く場合も「出席させる」と表記する。\n校外エリアに送られた出席者を元のマスに置く場合も、場へ置く処理なので「出席させる」と表記する。\n「出席したとき」は、カードが場へ置かれた直後に発動する効果を示す。","related":"場 / 出席時効果","notes":"カードを場へ置く動作は「出席する」「出席させる」に統一する。デッキや手札へ戻す処理とは区別する。"},{"id":"late","title":"遅刻X","category":"keyword","order":510,"summary":"出席までXターン遅刻ゾーンで待機する。","body":"遅刻を持つカードは、使用後すぐに場へ出ず遅刻ゾーンへ置く。\nXは出席までの残りターン数を示す。\nカウントが0になると指定したマスへ出席する。\n陽気を持つかどうかは、各カードの本文を参照する。","related":"遅刻ゾーン / 出席 / 陽気","notes":""},{"id":"cheerful","title":"陽気","category":"keyword","order":520,"summary":"出席したターンから、相手の出席者を攻撃できる。","body":"陽気を持つ出席者は召喚酔いを無視し、場へ出席したターンから相手の出席者を攻撃できる。\n陽気によって出席したターンに攻撃する場合、相手本体は攻撃できない。\n先攻1ターン目の攻撃制限は無視できない。\n教師カードの陽気は、教卓マスにいることが条件となる場合がある。\n超陽気は、陽気よりも強い攻撃制限解除として扱う。","related":"召喚酔い / 超陽気 / 先攻1ターン目 / 教卓マス / 攻撃対象","notes":""},{"id":"super_cheerful","title":"超陽気","category":"keyword","order":521,"summary":"出席したターンから、相手の出席者にも相手本体にも攻撃できる。","body":"超陽気を持つ出席者は召喚酔いを無視し、場へ出席したターンから相手の出席者または相手本体を攻撃できる。\n先攻1ターン目の攻撃制限は無視できない。\n陽気として参照される効果では、超陽気も陽気を持つものとして扱う。","related":"陽気 / 召喚酔い / 攻撃対象","notes":"旧表記「ネアカ」は「超陽気」に統一する。"},{"id":"attention","title":"注目","category":"keyword","order":525,"summary":"相手の攻撃対象を、このキーワードを持つ出席者へ限定する。","body":"注目を持つ出席者が場にいるかぎり、相手の出席者は、注目を持たない出席者や相手本体を攻撃できない。\n注目を持つ出席者が複数いる場合、攻撃側はその中から1人を攻撃対象として指名する。","related":"攻撃対象 / 指名 / 出席者 / 超注目","notes":"超注目を持つ出席者は、注目も持つものとして扱う。"},{"id":"bloodsucking","title":"吸血","category":"keyword","order":526,"summary":"ヴァンパイアが攻撃時に、与えたダメージぶん回復する共通効果。","body":"ヴァンパイアが攻撃したとき、相手に実際に与えたダメージと同じ量だけ、そのヴァンパイアの体力を回復する。\n最大体力を超えて回復しない。","related":"ヴァンパイア / 攻撃 / ダメージ / 回復","notes":""},{"id":"super_attention","title":"超注目","category":"keyword","order":526,"summary":"攻撃対象と、指名する効果の対象を、このキーワードを持つ出席者へ限定する。","body":"超注目を持つ出席者が場にいるかぎり、相手の出席者は、超注目を持たない出席者や相手本体を攻撃できない。\nまた、相手が出席者を指名する効果を使う場合、ランダムかどうかにかかわらず、超注目を持たない出席者を指名できない。\n超注目を持つ出席者が複数いる場合、攻撃側または効果を使う側は、その中から1人を対象として指名する。","related":"注目 / 攻撃対象 / 指名 / ランダム / 出席者","notes":"ランダムに指名する効果も、超注目を持つ出席者だけを候補にする。"},{"id":"drowsiness","title":"眠気","category":"keyword","order":527,"summary":"攻撃時、50%の確率で攻撃を外す。","body":"眠気を持つ出席者が攻撃するとき、攻撃宣言のたびに50%の確率で攻撃を外す。\n攻撃を外した場合も、そのターンの攻撃回数を消費する。ダメージと反撃は発生しない。","related":"攻撃 / 反撃 / 攻撃回数","notes":""},{"id":"lecture","title":"講義","category":"keyword","order":528,"summary":"教卓マスにいる教師が持つ共通効果。","body":"タイプ「教師」が教卓マスにいるなら、自分のターン終了時、相手の場のタイプ「学生」すべてに1ダメージを与える。\nカード本文で講義の対象が変更されている場合、そのカード本文を優先する。\n「デザインデーモンスレイヤー」が教卓マスにいる場合、通常の講義対象である学生ではなく、相手のヴァンパイアすべてに1ダメージを与える。ヴァンパイアへ与える1ダメージは弱点を参照せず、常に1ダメージとして処理する。","related":"教師 / 教卓マス / ターン終了 / 学生 / ヴァンパイア","notes":"教師が席マスにいる場合、教卓マスを条件とする講義は発動しない。"},{"id":"composure","title":"余裕","category":"keyword","order":529,"summary":"自分のターン終了時、この出席者の体力を2回復する。","body":"余裕を持つ出席者は、自分のターン終了時、自身の体力を2回復する。\n回復後の体力は最大体力を超えない。","related":"ターン終了 / 回復 / 体力","notes":""},{"id":"fusion","title":"融合","category":"keyword","order":530,"summary":"複数のカードをまとめて新しいカードを生成する。","body":"指定された複数のカードを消費し、別のカードへ変える処理。\n例：手札の定規2枚を融合し、ダブルダイヤモンドクロスを生成する。","related":"定規 / ダブルダイヤモンドクロス / 生成","notes":""},{"id":"equipment","title":"装備","category":"keyword","order":535,"summary":"持ち物を出席者に付け、継続する効果を与える。","body":"装備カードは、カード本文で指定された自分の出席者に付ける。\n装備した持ち物は通常の使用済み持ち物と異なり、すぐには校外エリアへ送らない。\n装備先の出席者が場を離れた場合、装備していた持ち物も校外エリアへ送る。\n装備カードは1人につき1枚まで。すでに装備カードが付いている出席者には、新しい装備カードを付けられない。\n現在のU太用装備カードは「U太」にのみ装備できる。「裏U太」には装備できない。","related":"持ち物 / 出席者 / 校外エリア / U太 / 裏U太","notes":""},{"id":"generation","title":"生成","category":"keyword","order":540,"summary":"通常のカードプール外からカードを作って加える。","body":"カード効果によって、生成限定カードを手札や場へ新しく作ること。\n生成限定カードは通常のデッキへ直接入れない。","related":"生成限定 / 手札 / 出席","notes":""},{"id":"merge_attendance","title":"合体出席","category":"keyword","order":545,"summary":"条件を満たした出席者を破壊し、指定された席マスへ別の出席者を出す。","body":"カード本文で指定された組み合わせが自分の場にそろった場合、それらの出席者を破壊し、指定された席マスへ新しい出席者を出席させる。\n合体によって出席したカードの出席時効果は通常どおり発動する。\n例：「単細胞生物」2人は「ミジンコ」になり、「ミジンコ」2人は「生物」になる。","related":"出席 / 破壊 / 単細胞生物 / ミジンコ / 生物 / 完全変異体","notes":""},{"id":"evolution","title":"進化","category":"keyword","order":550,"summary":"指定された進化元の上に進化カードを重ねる処理。","body":"指定された進化元カードの上へ進化カードを重ねる。\n進化元を置いてから1ターン経過するまで進化できない。\n進化前に受けていたダメージは進化後も引き継ぐ。\n進化前の出席者がすでに攻撃していた場合、進化後もそのターンは攻撃できない。\n進化後は進化カードの攻撃力・体力・能力を使用する。\nカード効果で「進化のための戦意を消費しない」と書かれている場合、戦意だけを支払わない。進化元を置いてから1ターン経過する制限は、カード本文で特別に無視すると書かれていないかぎり残る。「どんぐり」による進化は例外として、進化元を出席させたターンでも進化できる。\n進化すると、画面上では進化カードが上から進化元に重なる演出が入る。オンライン対戦でも、進化後の状態と演出を双方の画面で同じように扱う。","related":"出席 / 召喚酔い / 攻撃済み / オンライン対戦","notes":""},{"id":"transformation","title":"変化","category":"keyword","order":560,"summary":"条件を満たしたカードが別のカードへ置き換わる。","body":"指定された条件を満たしたカードを、別のカードへ置き換える処理。\n変化前のカードは手札や場から消え、変化後のカードとして扱う。\n例：濡れた食券は手札にある状態で自分のターン開始を3回迎えると、乾いた食券へ変化する。\n環境「学友会」は、環境マスにある状態でターンが2回終了すると「裏学友会」へ変化する。","related":"濡れた食券 / 乾いた食券 / 学友会 / 裏学友会","notes":""},{"id":"copy","title":"コピー","category":"keyword","order":570,"summary":"元カードの情報を引き継いだ新しいカードを作る。","body":"指定されたカードを複製し、新しいカードとして場や手札へ加える処理。\nコピーは、元カードの能力、効果、現在の攻撃力・最大体力・現在体力を引き継ぐ場合がある。\nコピーは新しく出席したカードとして扱い、召喚酔いが発生する。\n「吸血鬼化」はコピーではなく、対象をタイプ「ヴァンパイア」にした後で自分の場へ移す。","related":"出席 / 召喚酔い / 吸血鬼化","notes":""},{"id":"field_term","title":"場","category":"term","order":600,"summary":"カードが実際に出ている盤面上の場所。","body":"席マス、教卓マス、環境マスなど、カードが出ている場所全体を指す。\n手札、デッキ、遅刻ゾーン、校外エリアは場に含めない。","related":"席マス / 教卓マス / 環境マス","notes":""},{"id":"vitality","title":"気力","category":"term","order":601,"summary":"プレイヤー本体の体力。0になると敗北する。","body":"各プレイヤーは気力20からゲームを開始する。\nダメージを受けると気力が減り、回復すると気力が増える。\n気力が0以下になったプレイヤーは敗北する。","related":"勝利・敗北条件 / ダメージ / 回復","notes":"回復しても通常は20を超えない。"},{"id":"deck","title":"デッキ","category":"term","order":602,"summary":"ゲーム中にカードを引く山札。","body":"デッキはカードを引くための山札。\nゲーム開始時は、デッキ構築で作ったカードの束をシャッフルして使う。\nターン開始時の通常ドローでデッキからカードを引けない場合、デッキ切れで敗北する。","related":"デッキ構築 / ドロー / デッキ切れ / シャッフル","notes":""},{"id":"hand","title":"手札","category":"term","order":603,"summary":"自分が持っていて、これから使えるカード。","body":"手札は、自分だけが内容を確認できるカードの集まり。\n自分のターン中、戦意や条件を満たしていれば手札のカードを使える。\nカード効果で手札にカードを加えたり、手札からカードを校外エリアへ送ったりすることがある。","related":"初期手札 / ドロー / 戦意 / 持ち物","notes":""},{"id":"attack_power","title":"攻撃力","category":"term","order":604,"summary":"攻撃したときに与える基本ダメージ。","body":"カード左下に表示される数値。\n出席者が攻撃したとき、その攻撃力ぶん対象にダメージを与える。\n効果で攻撃力が増減している場合は、現在の攻撃力を使う。","related":"カードの見方 / 攻撃対象 / ダメージ / 反撃","notes":""},{"id":"hand_choice","title":"手札を選ぶ効果","category":"term","order":604,"summary":"手札の中からカードを選んで処理する効果。","body":"カード効果で「手札を選ぶ」と書かれている場合、指定された枚数のカードを選ぶ画面が出る。\n選ばれたカードは、カード本文に従って手札に残す、手札に加える、校外エリアへ送るなどの処理を行う。\nオンライン対戦では、手札を選ぶ画面はその手札を持つプレイヤーだけに表示する。相手には確定後の結果だけが共有される。","related":"手札 / 非公開操作 / 校外エリア / オンライン対戦","notes":"細い、〇〇デッキ〇〇抜きなどで使う。"},{"id":"health_value","title":"体力","category":"term","order":605,"summary":"出席者が場に残るための耐久値。","body":"カード右下に表示される数値。\n出席者がダメージを受けると現在体力が減る。\n現在体力が0以下になった出席者は校外エリアへ送られる。","related":"カードの見方 / ダメージ / 回復 / 最大体力","notes":""},{"id":"maximum_health","title":"最大体力","category":"term","order":606,"summary":"出席者が回復できる体力の上限。","body":"最大体力は、その出席者が回復できる体力の上限。\n体力を+する効果は最大体力も増やす。\nダメージを受けている出席者を回復しても、最大体力を超えて回復しない。","related":"体力 / 回復 / ダメージ","notes":""},{"id":"type_term","title":"タイプ","category":"term","order":607,"summary":"カードの種類を示す分類。","body":"タイプは、カードの大きな種類を示す。\n現在は「学生」「教師」「ヴァンパイア」「持ち物」「環境」がある。\nタイプごとに置ける場所や共通ルールが異なる。","related":"学生 / 教師 / ヴァンパイア / 持ち物 / 環境","notes":""},{"id":"temporary_buff","title":"一時的な強化","category":"term","order":607,"summary":"指定された期間だけ攻撃力や体力を増やす効果。","body":"「ターン終了時まで」と書かれた強化は、そのターンの終了時効果を処理したあとに終了する。\n体力を+する効果は、その期間中だけ最大体力も増やす。効果が終わると最大体力は元に戻る。\n受けていたダメージ量は維持されるため、最大体力が戻った結果、現在体力が下がることがある。","related":"体力 / 最大体力 / ターン終了時効果","notes":"UXデザインの教科書などで使う考え方。"},{"id":"shuffle","title":"シャッフル","category":"term","order":608,"summary":"デッキの順番をランダムに混ぜること。","body":"シャッフルは、デッキのカード順をランダムに入れ替える処理。\nマリガンや、手札をデッキに戻す効果などで行う。","related":"デッキ / マリガン / ランダム","notes":""},{"id":"random_term","title":"ランダム","category":"term","order":609,"summary":"対象や順番をプレイヤーが選ばず、無作為に決めること。","body":"ランダムと書かれている効果では、プレイヤーが対象を選ばない。\n条件を満たす候補の中から、ゲームが無作為に対象を決める。","related":"指名 / デッキ / 手札","notes":""},{"id":"attendee","title":"出席者","category":"term","order":610,"summary":"席マスまたは教卓マスに出席しているカード。","body":"場の席マスまたは教卓マスに存在する、攻撃力と体力を持つカードを指す。\n環境カードは出席者として扱わない。","related":"出席 / 場","notes":""},{"id":"row_column","title":"行・列","category":"term","order":620,"summary":"3×3の席マスの位置を、行列と同じ順序で示す。","body":"座標は必ず「行→列」の順で表記する。\n行は上から下へ1行目、2行目、3行目と数え、列は左から右へ1列目、2列目、3列目と数える。\nたとえば「2行3列」は、上から2番目・左から3番目の席マスを示す。座標は各プレイヤーの盤面を基準に判定する。","related":"席マス","notes":"相手盤面は画面上で鏡合わせに表示されるが、ルール上の座標は行→列で扱う。"},{"id":"designation","title":"指名","category":"term","order":625,"summary":"条件を満たす人物を、効果や攻撃の対象として決めること。","body":"出席者、学生、教師などの人物を対象として決めることを「指名」と呼ぶ。\n人物の人数は「1人」「2人」のように数える。\n手札やデッキのカードは「1枚」「2枚」のように数える。\nランダム処理では対象が無作為に指名され、プレイヤー自身は対象を決めない。","related":"出席者 / 攻撃対象 / ランダム","notes":""},{"id":"trigger_on_attendance","title":"出席時効果","category":"term","order":626,"summary":"出席した直後に発動する効果。","body":"「出席したとき」と書かれた効果を出席時効果と呼ぶ。\n手札から出席した場合だけでなく、カード効果によって出席した場合にも、基本的には発動する。\nただし、カード本文に発動しないと書かれている場合は、その指示を優先する。","related":"出席 / 生成 / コピー","notes":""},{"id":"no_attendance","title":"出席不可","category":"term","order":627,"summary":"指定されたマスにカードを出席できない状態。","body":"出席不可になっているマスには、カードを出席させられない。\nすでに出席者がいるマスや、環境カード・持ち物の効果で封鎖されたマスなどが対象になる。\n「1ターン出席不可」と書かれている場合、対象プレイヤーの次のターン中はそのマスに出席できない。\nカード本文に例外がある場合、その本文を優先する。","related":"席マス / 出席 / 環境 / 持ち物","notes":""},{"id":"adjacent","title":"隣接","category":"term","order":630,"summary":"対象と同じ行にある、すぐ左とすぐ右の席マス。","body":"隣接は、対象の席マスと同じ行にある左右1マスを指す。\n上下や斜めの席マスは隣接に含めない。盤面外の位置は含めない。","related":"席マス / 行 / 列","notes":""},{"id":"surrounding_one","title":"周囲1マス","category":"term","order":635,"summary":"対象の左右・上下・斜めにある、1マス以内の席マス。","body":"周囲1マスは、対象の席マスから左右、上下、斜めにある1マスを指す。\n中央の席マスを基準にした場合、周囲の最大8マスが対象となる。盤面外の位置は含めない。\n隣接とは別の範囲。隣接は同じ行の左右だけを指す。","related":"席マス / 隣接 / 行 / 列","notes":""},{"id":"destroy","title":"破壊","category":"term","order":640,"summary":"カードを場から校外エリアへ送る。","body":"カード効果によって破壊されたとき、または現在体力が0以下になったとき、そのカードを場から校外エリアへ送る。","related":"校外エリア / 体力","notes":""},{"id":"overwrite","title":"上書き","category":"term","order":641,"summary":"環境マスのカードを別の環境カードに置き換えること。","body":"環境マスにすでに環境カードがある場合、異なる名前の環境カードを出すことで上書きできる。\n上書きされた環境カードは校外エリアへ送る。\n原則として、同名カードでは上書きできない。","related":"環境マス / 環境 / 同名カード / 校外エリア","notes":"カード本文に例外がある場合、その本文を優先する。"},{"id":"same_name","title":"同名カード","category":"term","order":642,"summary":"同じカード名を持つカード。","body":"同名カードは、カード名が同じカードを指す。\nデッキ構築では、同名カードは原則として最大3枚まで入れられる。\n環境マスでは、原則として同名の環境カードで上書きできない。","related":"デッキ構築 / 投入上限 / 環境マス / 上書き","notes":""},{"id":"copy_limit","title":"投入上限","category":"term","order":643,"summary":"同じカードをデッキに入れられる最大枚数。","body":"投入上限は、同じ名前のカードを1つのデッキに入れられる最大枚数。\n原則は3枚まで。\nカード本文に個別の上限がある場合、その上限を優先する。","related":"デッキ構築 / 同名カード / カード一覧","notes":""},{"id":"token","title":"トークン","category":"term","order":644,"summary":"カード効果によって場に作られるカード。","body":"トークンは、カード効果によって場に作られるカード。\n通常のデッキには直接入れない。\n場を離れる場合は、他の出席者と同じように校外エリアへ送られる。","related":"生成 / 出席 / 校外エリア / カード一覧","notes":""},{"id":"private_counter","title":"カニカウント","category":"term","order":645,"summary":"カニ勝利に必要なカードがそろうと始まる公開カウント。","body":"手札に「○○○ガニ」が2枚以上、「毛蟹」と「どこにも居場所がないカニ」が1枚以上ずつある状態で自分のターンを終了すると、カニカウントが4で開始する。\n以後、自分のターン終了時にカウントを1ずつ減らす。0になるとカニ勝利する。\nカニカウントは「🦀4」のように表示し、お互いのプレイヤーが確認できる。\n一度開始したカニカウントは、必要カードが手札からなくなってもリセットしない。","related":"特殊勝利 / ○○○ガニ / 毛蟹 / どこにも居場所がないカニ","notes":"カニ勝利時の表示は「かーちー🦀」。"},{"id":"library_out","title":"デッキ切れ（LO）","category":"term","order":650,"summary":"ターン開始時にカードを引けず敗北すること。","body":"自分のターン開始時、デッキが空で通常ドローを行えない場合、その場で敗北する。\nカード効果でデッキが空になっただけでは、すぐに敗北しない。次に自分のターン開始時の通常ドローを行う時、引けなければ敗北する。\nLOはLibrary Outの略。","related":"ドロー / 敗北 / デッキから校外へ送る","notes":"LOで勝った側は「gLOry」、負けた側は「LOse」と表示する。"},{"id":"deck_to_trash","title":"デッキから校外へ送る","category":"term","order":655,"summary":"デッキのカードを引かずに校外エリアへ送る処理。","body":"「デッキの上からN枚を校外エリアへ送る」と書かれている場合、デッキの上から指定枚数のカードを取り、手札には加えず校外エリアへ送る。\nこれはドローではない。\nデッキが指定枚数より少ない場合、可能な枚数だけ校外エリアへ送る。\nデッキが空になっても、その場ですぐ敗北するわけではない。自分のターン開始時の通常ドローで引けない場合にデッキ切れで敗北する。","related":"デッキ / 校外エリア / ドロー / デッキ切れ / Dos攻撃","notes":"Dos攻撃やデストロイDos攻撃は、この処理を使う。"}];
    const vampireRule = RULES.find((rule) => rule.id === "type_vampire");
    if (vampireRule) {
      vampireRule.body = "ヴァンパイアは席マスと教卓マスへ出席できる。\n\n【吸血】\nこのカードが攻撃したとき、相手に実際に与えたダメージと同じ量だけ、このカードの体力を回復する。最大体力を超えて回復しない。\n\n【弱点】\n相手の「定規」、カード名に「デザイン」を含むタイプ「教師」、「ダブルダイヤモンドクロス」から受けるダメージは2倍になる。ただし、「デザインデーモンスレイヤー」の講義による1ダメージは弱点を参照しない。\n\n【特殊破壊】\n相手の場に「デザインデーモンスレイヤー」がいる状態で「ダブルダイヤモンドクロス」のダメージを受けた場合、残り体力に関係なく破壊される。直接ダメージと隣接ダメージの両方に適用する。";
      vampireRule.related = "吸血 / 定規 / デザイン / 教師 / ダブルダイヤモンドクロス / デザインデーモンスレイヤー";
    }
    const equipmentRule = RULES.find((rule) => rule.id === "equipment");
    if (equipmentRule) {
      equipmentRule.body = "装備カードは、カード本文で指定された自分の出席者につける。\n装備カードは通常、1人につき1枚まで。すでに装備カードがついている出席者には、新しい装備カードをつけられない。\n現在のU太用装備カードは「U太」と「裏U太」に装備できる。「裏U太」には装備カードを2枚までつけられる。\n「U太」が「裏U太」に進化した場合、進化元についていた装備カードとその効果を引き継ぐ。";
    }
    RULES.push(
      {
        id: "saved_decks",
        title: "保存デッキ",
        category: "basic",
        order: 62,
        summary: "作成したデッキを名前ごとに保存し、変更・確認・削除できる。",
        body: "ホーム画面の「デッキ変更」を押すと、保存デッキが3列の一覧で表示される。\n「新規作成」では空のデッキから作り始める。既存のデッキ名を押すと、内容の確認、変更、削除を選べる。\n既存デッキを変更して保存する場合は、上書き前に確認画面が表示される。\nソロバトルでは、自分が使う保存デッキとAIが使う保存デッキをそれぞれ選ぶ。",
        related: "デッキ構築 / ソロバトル / カード一覧",
        notes: "ブラウザの保存データを消すと保存デッキも消えるため、必要なデッキはJSONファイルとして書き出して保管できる。"
      },
      {
        id: "card_search_filters",
        title: "カード検索・絞り込み",
        category: "basic",
        order: 64,
        summary: "カード名、タイプ、戦意、効果分類からカードを探す。",
        body: "デッキ作成画面の「カード検索・絞り込み」は最初は折り畳まれている。見出しの三角を押して開くと、カード名の検索に加え、タイプ、戦意、効果分類でカードを絞り込める。カードの効果テキストは検索対象に含まれない。\n同じ項目の中で複数選んだ場合は、いずれか1つに当てはまるカードを表示する。別の項目も選んだ場合は、すべての項目の条件を満たすカードだけを表示する。\nたとえば、タイプで「学生」と「教師」、戦意で「2」と「3」、分類で「回復」を選ぶと、学生または教師で、戦意2または3であり、回復に分類されるカードを表示する。",
        related: "カード一覧 / タイプ / 戦意 / デッキ構築",
        notes: "効果分類は、ドロー、サーチ・生成、回復、除去、バフ・デバフ、妨害、展開、進化、融合、装備。進化・融合・装備は、完成後のカードだけでなく、それに必要なカードも含む。"
      }
    );
    function updateRule(id, changes) {
      const rule = RULES.find((entry) => entry.id === id);
      if (rule) Object.assign(rule, changes);
    }
    updateRule("field_term", {
      title: "講義室",
      summary: "カードが実際に出ている、講義室内の場所全体。",
      body: "席マス、教卓マス、環境マスなど、カードが出ている場所全体を「講義室」と呼ぶ。\n手札、デッキ、遅刻ゾーン、校外エリアは講義室に含めない。",
      related: "席マス / 教卓マス / 環境マス / 出席者"
    });
    updateRule("attendee", {
      summary: "席マスまたは教卓マスに出席しているカード。",
      body: "講義室の席マスまたは教卓マスに存在する、攻撃力と体力を持つカードを指す。\n環境カードは出席者として扱わない。",
      related: "出席 / 講義室"
    });
    updateRule("destroy", {
      summary: "カードを講義室から校外エリアへ送る。",
      body: "カード効果によって破壊されたとき、または現在体力が0以下になったとき、そのカードを講義室から校外エリアへ送る。",
      related: "講義室 / 校外エリア / 体力"
    });
    updateRule("health_value", {
      summary: "出席者が講義室に残るための耐久値。",
      body: "カード右下に表示される数値。\n出席者がダメージを受けると現在体力が減る。\n現在体力が0以下になった出席者は校外エリアへ送られる。",
      related: "カードの見方 / ダメージ / 回復 / 最大体力"
    });
    function normalizeLectureRoomText(value) {
      return String(value || "")
        .replaceAll("お互いの場", "お互いの講義室")
        .replaceAll("自分の場", "自分の講義室")
        .replaceAll("相手の場", "相手の講義室")
        .replaceAll("場全体", "講義室全体")
        .replaceAll("場の", "講義室の")
        .replaceAll("場に", "講義室に")
        .replaceAll("場を", "講義室を")
        .replaceAll("場へ", "講義室へ")
        .replaceAll("場から", "講義室から")
        .replaceAll("場が", "講義室が")
        .replaceAll("場は", "講義室は")
        .replaceAll("場で", "講義室で");
    }
    RULES.forEach((rule) => {
      rule.summary = normalizeLectureRoomText(rule.summary);
      rule.body = normalizeLectureRoomText(rule.body);
      rule.related = normalizeLectureRoomText(rule.related);
      rule.notes = normalizeLectureRoomText(rule.notes);
    });
    const CATEGORY_LABELS = {"basic":"基本ルール","board":"盤面","turn":"ターン進行","combat":"戦闘","type":"タイプ共通効果","keyword":"キーワード","term":"用語"};
    let selectedId = RULES[0]?.id || null;
    const elements = {
      search: document.getElementById('searchInput'),
      category: document.getElementById('categoryFilter'),
      count: document.getElementById('countText'),
      list: document.getElementById('list'),
      detail: document.getElementById('detail')
    };
    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
    }
    const RELATED_ALIASES = {
      "気力": "vitality",
      "戦意": "will",
      "必要戦意": "necessary_will",
      "攻撃力": "attack_power",
      "体力": "health_value",
      "最大体力": "maximum_health",
      "講義室": "field_term",
      "デッキ": "deck",
      "手札": "hand",
      "初期手札": "initial_hand",
      "シャッフル": "shuffle",
      "ランダム": "random_term",
      "タイプ": "type_term",
      "学生": "type_student",
      "教師": "type_teacher",
      "ヴァンパイア": "type_vampire",
      "持ち物": "type_item",
      "環境": "type_environment",
      "先攻": "first_second",
      "後攻": "first_second",
      "先攻1ターン目": "first_turn_attack",
      "カードじゃんけん": "card_janken",
      "ターン開始時効果": "turn_start_effect",
      "ターン終了時効果": "turn_end_effect",
      "攻撃": "attack_targets",
      "攻撃済み": "attack_limit",
      "攻撃対象": "attack_targets",
      "出席時効果": "trigger_on_attendance",
      "出席不可": "no_attendance",
      "デッキ切れ": "library_out",
      "遅刻": "late",
      "行": "row_column",
      "列": "row_column",
      "上書き": "overwrite",
      "同名カード": "same_name",
      "投入上限": "copy_limit",
      "トークン": "token",
      "生成限定": "generation",
      "吸血": "bloodsucking",
      "カード一覧": "card_list_reference",
      "ホスト": "online_battle",
      "ゲスト": "online_battle",
      "観戦者": "online_battle",
      "単細胞生物": "merge_attendance",
      "ミジンコ": "merge_attendance",
      "生物": "merge_attendance",
      "完全変異体": "merge_attendance"
    };
    const RULE_TITLE_TO_ID = new Map();
    function normalizeLabel(value) {
      return String(value || '').replace(/[「」『』（）()\\s]/g, '').replace(/X$/, '').toLowerCase();
    }
    RULES.forEach((rule) => {
      RULE_TITLE_TO_ID.set(rule.title, rule.id);
      RULE_TITLE_TO_ID.set(normalizeLabel(rule.title), rule.id);
    });
    function splitLinks(value) {
      return String(value || '').split('/').map((part) => part.trim()).filter(Boolean);
    }
    function resolveRuleId(label) {
      const raw = String(label || '').trim();
      const normalized = normalizeLabel(raw);
      if (!raw) return null;
      if (RELATED_ALIASES[raw]) return RELATED_ALIASES[raw];
      if (RULE_TITLE_TO_ID.get(raw)) return RULE_TITLE_TO_ID.get(raw);
      if (RULE_TITLE_TO_ID.get(normalized)) return RULE_TITLE_TO_ID.get(normalized);
      const titleHit = RULES.find((rule) => {
        const title = normalizeLabel(rule.title);
        return title.includes(normalized) || normalized.includes(title);
      });
      if (titleHit) return titleHit.id;
      const textHit = RULES.find((rule) => [rule.summary, rule.body, rule.notes].some((text) => String(text || '').includes(raw)));
      return textHit?.id || null;
    }
    function renderRuleLinks(value) {
      const links = splitLinks(value);
      if (!links.length) return '';
      return '<div class="link-list">' + links.map((label) => {
        const id = resolveRuleId(label);
        if (!id || !RULES.some((rule) => rule.id === id)) return '<span class="link-chip is-missing">' + escapeHtml(label) + '</span>';
        return '<button class="link-chip" type="button" data-rule-link="' + escapeHtml(id) + '">' + escapeHtml(label) + '</button>';
      }).join('') + '</div>';
    }
    function matches(rule) {
      const query = elements.search.value.trim().toLowerCase();
      const haystack = [rule.title, rule.id, rule.summary, rule.body, rule.related, rule.notes].join(' ').toLowerCase();
      return (!query || haystack.includes(query)) && (!elements.category.value || rule.category === elements.category.value);
    }
    function filteredRules() {
      return RULES.filter(matches).sort((a, b) => (a.order ?? 9999) - (b.order ?? 9999) || a.title.localeCompare(b.title, 'ja'));
    }
    function renderList() {
      const rules = filteredRules();
      elements.count.textContent = '表示 ' + rules.length + '項目 / 全' + RULES.length + '項目';
      if (!rules.some((rule) => rule.id === selectedId)) selectedId = rules[0]?.id || null;
      let lastCategory = '';
      elements.list.innerHTML = rules.map((rule) => {
        const group = rule.category !== lastCategory ? '<div class="group">' + escapeHtml(CATEGORY_LABELS[rule.category] || rule.category) + '</div>' : '';
        lastCategory = rule.category;
        const active = rule.id === selectedId ? ' active' : '';
        return group + '<button class="row' + active + '" type="button" data-id="' + escapeHtml(rule.id) + '">'
          + '<span><span class="row-title">' + escapeHtml(rule.title) + '</span>'
          + '<span class="row-sub">' + escapeHtml(rule.summary || '') + '</span></span>'
          + '<span class="meta"><span class="badge">' + escapeHtml(CATEGORY_LABELS[rule.category] || rule.category) + '</span></span>'
          + '</button>';
      }).join('') || '<p class="muted">該当するルール・用語がありません。</p>';
      renderDetail();
    }
    function renderDetail() {
      const rule = RULES.find((entry) => entry.id === selectedId);
      if (!rule) {
        elements.detail.innerHTML = '<p class="muted">左の一覧から項目を選んでください。</p>';
        return;
      }
      elements.detail.innerHTML = '<h2>' + escapeHtml(rule.title) + '</h2>'
        + '<div class="detail-meta"><span class="badge">' + escapeHtml(CATEGORY_LABELS[rule.category] || rule.category) + '</span>'
        + '<span class="badge">ID: ' + escapeHtml(rule.id) + '</span></div>'
        + '<section><h3>概要</h3><div class="text-block">' + escapeHtml(rule.summary || '-') + '</div></section>'
        + '<section><h3>説明</h3><div class="text-block">' + escapeHtml(rule.body || '-') + '</div></section>'
        + (rule.related ? '<section><h3>関連</h3>' + renderRuleLinks(rule.related) + '</section>' : '')
        + (rule.notes ? '<section><h3>備考</h3><div class="text-block">' + escapeHtml(rule.notes) + '</div></section>' : '');
    }
    function scrollSelectedRuleIntoView(id) {
      const row = [...elements.list.querySelectorAll('[data-id]')].find((entry) => entry.dataset.id === id);
      if (row) row.scrollIntoView({ block: 'center', behavior: 'smooth' });
      elements.detail.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function selectRule(id, clearFilters = false) {
      selectedId = id;
      if (clearFilters) {
        elements.search.value = '';
        elements.category.value = '';
      }
      renderList();
      requestAnimationFrame(() => scrollSelectedRuleIntoView(id));
    }
    elements.list.addEventListener('click', (event) => {
      const row = event.target.closest('[data-id]');
      if (!row) return;
      selectRule(row.dataset.id);
    });
    elements.detail.addEventListener('click', (event) => {
      const link = event.target.closest('[data-rule-link]');
      if (!link) return;
      selectRule(link.dataset.ruleLink, true);
    });
    [elements.search, elements.category].forEach((element) => element.addEventListener('input', renderList));
    renderList();
  </script>
</body>
</html>
