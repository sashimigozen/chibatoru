<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>チバトル カード一覧 閲覧版</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --panel: #ffffff;
      --ink: #122033;
      --muted: #536276;
      --line: #b8c3d3;
      --accent: #2457d6;
      --accent-soft: #dbeafe;
      --danger: #b91c1c;
      --shadow: 0 10px 24px rgba(15, 23, 42, 0.1);
      --surface: #edf3f8;
      --panel-soft: #f8fbff;
      --teal: #0f766e;
      --amber: #b45309;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", YuGothic, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--surface) 58%, #e9eff6 100%);
      color: var(--ink);
    }
    header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      padding: 22px 28px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.06);
    }
    h1 { margin: 0; font-size: 24px; letter-spacing: 0; }
    .subtitle { margin: 6px 0 0; color: var(--muted); font-size: 13px; }
    .readonly-badge {
      flex: 0 0 auto;
      border: 1px solid var(--accent);
      color: var(--accent);
      background: var(--accent-soft);
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }
    main {
      height: calc(100vh - 86px);
      display: grid;
      grid-template-columns: minmax(300px, 38%) minmax(420px, 1fr);
      gap: 16px;
      padding: 16px;
    }
    .pane {
      min-height: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 150px 130px;
      gap: 8px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }
    .toolbar.rules { grid-template-columns: 1fr 170px; }
    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #ffffff;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
      font-size: 14px;
    }
    .count {
      padding: 8px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
    }
    .list {
      overflow: auto;
      padding: 8px;
      scrollbar-gutter: stable;
    }
    .row, .group {
      width: 100%;
      border: 0;
      background: transparent;
      text-align: left;
      font: inherit;
    }
    .group {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 8px 10px;
      color: var(--muted);
      background: var(--panel-soft);
      border-bottom: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      margin-bottom: 6px;
      padding: 10px;
      border: 1px solid #dbe4ef;
      border-left: 7px solid #64748b;
      border-radius: 8px;
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      box-shadow: 0 8px 16px rgba(15, 23, 42, 0.06);
      cursor: pointer;
      color: var(--ink);
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }
    .row:hover, .row.active {
      transform: translateY(-1px);
      border-color: #93c5fd;
      box-shadow: 0 12px 22px rgba(15, 23, 42, 0.12);
    }
    .row.active { box-shadow: inset 4px 0 0 var(--accent), 0 12px 22px rgba(15, 23, 42, 0.12); }
    .row.type-student {
      border-left-color: #0284c7;
      background: linear-gradient(135deg, #ffffff 0%, #e0f2fe 100%);
    }
    .row.type-teacher {
      border-left-color: #7c3aed;
      background: linear-gradient(135deg, #ffffff 0%, #ede9fe 100%);
    }
    .row.type-vampire {
      border-left-color: #dc2626;
      background: linear-gradient(135deg, #ffffff 0%, #fee2e2 100%);
    }
    .row.type-item {
      border-left-color: #d97706;
      background: linear-gradient(135deg, #ffffff 0%, #fef3c7 100%);
    }
    .row.type-environment {
      border-left-color: #16a34a;
      background: linear-gradient(135deg, #ffffff 0%, #dcfce7 100%);
    }
    .row-title { font-weight: 800; font-size: 14px; }
    .row-sub { margin-top: 3px; color: var(--muted); font-size: 12px; line-height: 1.45; }
    .meta { display: flex; gap: 5px; align-items: flex-start; flex-wrap: wrap; justify-content: flex-end; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 800;
      background: #eef2f7;
      color: #24364d;
      white-space: nowrap;
    }
    .student { background: #dff3ff; color: #164e63; }
    .teacher { background: #efe9ff; color: #553c9a; }
    .vampire { background: #ffe3e3; color: #991b1b; }
    .item { background: #fff2bf; color: #92400e; }
    .environment { background: #ddf8e8; color: #166534; }
    .detail {
      min-height: 0;
      overflow: auto;
      padding: 20px;
      scrollbar-gutter: stable;
    }
    .detail h2 { margin: 0 0 8px; font-size: 26px; letter-spacing: 0; }
    .detail-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(80px, 1fr));
      gap: 8px;
      margin: 14px 0;
    }
    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 10px;
    }
    .label { color: var(--muted); font-size: 12px; margin-bottom: 4px; }
    .value { font-weight: 800; font-size: 18px; }
    section + section { margin-top: 16px; }
    h3 { margin: 0 0 8px; font-size: 15px; color: var(--accent); }
    .guide-note {
      border: 1px solid #9ec5fe;
      border-left: 5px solid var(--accent);
      border-radius: 8px;
      padding: 10px 12px;
      background: #eef6ff;
      color: #14356f;
      line-height: 1.6;
      font-size: 14px;
      margin-bottom: 14px;
    }
    .text-block {
      white-space: pre-wrap;
      line-height: 1.7;
      border: 1px solid var(--line);
      background: #ffffff;
      border-radius: 8px;
      padding: 12px;
      font-size: 15px;
    }
    .link-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .link-chip {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      border: 1px solid #93c5fd;
      border-radius: 999px;
      background: #eff6ff;
      color: #1d4ed8;
      padding: 6px 11px;
      font: inherit;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.2;
      cursor: pointer;
    }
    .link-chip:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }
    .link-chip.is-missing {
      border-color: var(--line);
      background: #f8fafc;
      color: var(--muted);
      cursor: default;
    }
    .muted { color: var(--muted); }
    a { color: var(--accent); }
    @media (max-width: 860px) {
      header { display: block; padding: 18px 16px 12px; }
      .readonly-badge { display: inline-flex; margin-top: 10px; }
      main { height: auto; min-height: calc(100vh - 120px); grid-template-columns: 1fr; padding: 10px; }
      .pane { min-height: 360px; }
      .toolbar, .toolbar.rules { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>チバトル カード一覧</h1>
      <p class="subtitle">現在のカードプールをタイプ別・戦意順に確認するための閲覧専用ページ</p>
    </div>
    <span class="readonly-badge">閲覧専用</span>
  </header>
  <main>
    <div class="pane">
      <div class="toolbar">
        <input id="searchInput" type="search" placeholder="カード名・効果を検索">
        <select id="typeFilter" aria-label="タイプで絞り込み">
          <option value="">全タイプ</option>
          <option value="student">学生</option><option value="teacher">教師</option><option value="vampire">ヴァンパイア</option><option value="item">持ち物</option><option value="environment">環境</option>
        </select>
        <select id="availabilityFilter" aria-label="入手区分で絞り込み">
          <option value="">全区分</option>
          <option value="deck">デッキ投入</option><option value="generated">生成限定</option><option value="token">トークン</option>
        </select>
      </div>
      <div class="count" id="countText"></div>
      <div class="list" id="list"></div>
    </div>
    <div class="pane">
      <div class="detail" id="detail"></div>
    </div>
  </main>
  <script>
    const CARDS = [{"id":"dark_yuta","name":"裏U太","type":"student","cost":null,"attack":5,"hp":5,"availability":"deck","placement":"U太の上に進化","effect":"進化：「U太」。陽気を持つ。進化したとき、「U太」1枚を手札に生成する。進化元の「U太」についている装備カードは校外エリアへ送る。このカードには装備カードをつけられない。","combo":"U太","notes":"戦意なし。"},{"id":"extra_student","name":"エキストラ学生","type":"student","cost":null,"attack":1,"hp":1,"availability":"generated","placement":"席マス","effect":"陽気を持つ。カードの効果によって召喚される1/1の学生トークン。","combo":"エキストラの皆さん","notes":"戦意なし。 デッキには投入しない。"},{"id":"ta","name":"TA","type":"student","cost":0,"attack":2,"hp":1,"availability":"token","placement":"席マス","effect":"カードの効果によって召喚される学生トークン。","combo":"プロ言の長 / 論文マスター","notes":"デッキには投入しない。"},{"id":"midge","name":"ミジンコ","type":"student","cost":0,"attack":2,"hp":2,"availability":"token","placement":"席マス","effect":"このカードが出席したとき、相手の出席者1人をランダムに指名し、1ダメージを与える。自分の場に「ミジンコ」が2人いる場合、それらを破壊し、先に出席していた「ミジンコ」の席マスに「生物」を出席させる。","combo":"単細胞生物 / 生物 / 完全変異体","notes":"デッキには投入しない。"},{"id":"perfect_mutant","name":"完全変異体","type":"student","cost":0,"attack":13,"hp":13,"availability":"token","placement":"席マス","effect":"超陽気を持つ。このカードが出席したとき、相手の出席者すべてを破壊する。","combo":"単細胞生物 / ミジンコ / 生物","notes":"デッキには投入しない。"},{"id":"organism","name":"生物","type":"student","cost":0,"attack":6,"hp":6,"availability":"token","placement":"席マス","effect":"陽気を持つ。このカードが出席したとき、相手の出席者すべてに2ダメージを与える。自分の場に「生物」「ミジンコ」「単細胞生物」がいる場合、それらを破壊し、「生物」がいた席マスに「完全変異体」を出席させる。","combo":"単細胞生物 / ミジンコ / 完全変異体","notes":"デッキには投入しない。"},{"id":"success_student","name":"何をやっても成功する学生","type":"student","cost":0,"attack":2,"hp":4,"availability":"deck","placement":"何をやってもダメな学生の上に進化","effect":"進化：「何をやってもダメな学生」。進化したとき、自分の校外エリアにある学生の人数分、相手本体と相手の場の出席者に1ダメージずつランダムに割り振る。","combo":"何をやってもダメな学生","notes":""},{"id":"aggro_king","name":"アグロキング","type":"student","cost":1,"attack":1,"hp":2,"availability":"deck","placement":"席マス","effect":"このカードが3行1列にいる状態で自分のターンを2回終了したとき、このカードの攻撃力を+2、体力を+1する。","combo":"","notes":""},{"id":"aggro_student","name":"アグロ大学生","type":"student","cost":1,"attack":1,"hp":1,"availability":"deck","placement":"席マス","effect":"このカードが出席している相手の場の席には、どのカードも出席できない。","combo":"","notes":""},{"id":"single_cell","name":"単細胞生物","type":"student","cost":1,"attack":1,"hp":1,"availability":"deck","placement":"席マス","effect":"自分の場に「単細胞生物」が2人いる場合、それらを破壊し、先に出席していた「単細胞生物」の席マスに「ミジンコ」を出席させる。","combo":"ミジンコ / 生物 / 完全変異体 / ナイトプール / ナイトプール水","notes":""},{"id":"adjective_student","name":"形容詞学生","type":"student","cost":1,"attack":2,"hp":4,"availability":"deck","placement":"席マス","effect":"遅刻4。このカードが出席したとき、50%の確率でこのカードの攻撃力を+3する。","combo":"","notes":""},{"id":"ae_student","name":"あえー学生","type":"student","cost":2,"attack":0,"hp":4,"availability":"deck","placement":"席マス / 教卓マス","effect":"注目を持つ。","combo":"","notes":""},{"id":"aggro_queen","name":"アグロクイーン","type":"student","cost":2,"attack":1,"hp":1,"availability":"deck","placement":"席マス","effect":"このカードが2行3列にいる状態で自分のターンを終了したとき、相手の学生1人をランダムに指名し、2ダメージを与える。","combo":"","notes":""},{"id":"best_friend","name":"ベストフレンド","type":"student","cost":2,"attack":1,"hp":2,"availability":"deck","placement":"席マス","effect":"このカードは「バカでかい声の学生」の効果によるダメージを受けない。このカードが「バカでかい声の学生」と隣接しているかぎり、攻撃力を+2、体力を+2する。自分のターン終了時、相手の出席者1人をランダムに指名し、3ダメージを与える。","combo":"バカでかい声の学生","notes":""},{"id":"word_increaser","name":"ワードインクリーサー","type":"student","cost":2,"attack":1,"hp":1,"availability":"deck","placement":"席マス / 教卓マス","effect":"このカードが出席したとき、自分の手札をすべてデッキに戻してシャッフルする。その後、デッキを上から5枚まで引く。","combo":"","notes":""},{"id":"general_student","name":"一般学生","type":"student","cost":2,"attack":2,"hp":2,"availability":"deck","placement":"席マス","effect":"効果なし。","combo":"","notes":""},{"id":"lazy_student","name":"不真面目な学生","type":"student","cost":2,"attack":4,"hp":4,"availability":"deck","placement":"席マス","effect":"遅刻1。","combo":"","notes":""},{"id":"back_question_student","name":"後ろから質問する学生","type":"student","cost":2,"attack":1,"hp":1,"availability":"deck","placement":"席マス / 教卓マス","effect":"このカードが自分の3行目の席マスに出席したとき、相手の教卓マスにいる出席者に3ダメージを与える。","combo":"","notes":""},{     function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));

      const cleaned = compact.replace(/\d+枚.*$/, '').replace(/\d+人.*$/, '').replace(/を融合$/, '').trim();
      return CARD_NAME_TO_ID.get(raw)
        || CARD_NAME_TO_ID.get(compact)
        || CARD_NAME_TO_ID.get(cleaned)
        || CARDS.find((card) => compact.includes(card.name) || card.name.includes(compact))?.id

        if (!id) return '<span class="link-chip is-missing">' + escapeHtml(name) + '</span>';

    function matches(card) {

      return (!query || haystack.includes(query))

      }
      renderList();
      requestAnimationFrame(() => scrollSelectedCardIntoView(id));
    }
    elements.list.addEventListener('click', (event) => {
      const row = event.target.closest('[data-id]');
      if (!row) return;
      selectCard(row.dataset.id);
    });
    elements.detail.addEventListener('click', (event) => {
      const link = event.target.closest('[data-card-link]');
      if (!link) return;
      selectCard(link.dataset.cardLink, true);
    });
    [elements.search, elements.type, elements.availability].forEach((element) => element.addEventListener('input', renderList));
    renderList();
  </script>
</body>
</html>
